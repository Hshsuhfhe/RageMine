<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Логи посещений</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 16px; }

        /* Модальное окно */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal.hidden { display: none; }
        .modal-content { background: #fff; padding: 30px 24px; border-radius: 24px; max-width: 380px; width:100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-content h2 { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #1a1a2e; }
        .modal-content input { width:100%; padding: 14px 16px; margin: 8px 0; border: 1px solid #d0d7de; border-radius: 14px; font-size: 16px; background: #f8f9fc; }
        .modal-content input:focus { border-color: #4a6cf7; outline: none; background: #fff; }
        .modal-content button { width:100%; padding: 14px; background: #4a6cf7; color: #fff; border: none; border-radius: 14px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
        .modal-content button:hover { background: #3b5de7; }
        .error { color: #e74c3c; margin-top: 12px; font-size: 14px; }

        /* Основной контейнер */
        .container { width:100%; max-width: 1200px; background: #fff; border-radius: 24px; padding: 20px 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-top: 10px; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 1px solid #e9ecf0; padding-bottom: 14px; margin-bottom: 18px; }
        .header h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin:0; }
        .logout-btn { background: #ef4444; color: #fff; padding: 8px 20px; border: none; border-radius: 30px; font-size: 15px; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .logout-btn:hover { background: #dc2626; }

        /* Таблица */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 14px; border: 1px solid #e9ecf0; }
        table { width:100%; min-width: 800px; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e9ecf0; white-space: nowrap; }
        th { background: #f8f9fc; font-weight: 600; color: #2d3748; position: sticky; top:0; z-index:2; }
        tr:last-child td { border-bottom: none; }
        .empty-msg { text-align: center; color: #94a3b8; padding: 30px 0; font-size: 16px; }

        /* Статус загрузки */
        .status { font-size: 14px; color: #4a6cf7; margin: 8px 0; display: flex; align-items: center; gap: 8px; }
        .loader { display: inline-block; width: 18px; height: 18px; border: 3px solid #f3f3f3; border-top: 3px solid #4a6cf7; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Адаптив */
        @media (max-width: 600px) {
            .container { padding: 14px 10px; }
            .header h1 { font-size: 18px; }
            .logout-btn { font-size: 13px; padding: 6px 14px; }
            th, td { padding: 8px 8px; font-size: 11px; }
            table { min-width: 650px; }
        }
    </style>
</head>
<body>

<!-- ===== Модальное окно входа ===== -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>🔐 Вход</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Имя пользователя" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
            <div id="loginError" class="error"></div>
        </form>
    </div>
</div>

<!-- ===== Основной контент ===== -->
<div class="container" id="mainContent" style="display: none;">
    <div class="header">
        <h1>📋 История посещений</h1>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    <div id="statusMessage" class="status"></div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Дата и время</th>
                    <th>IP</th>
                    <th>Страна</th>
                    <th>Регион</th>
                    <th>Город</th>
                    <th>Улица</th>
                    <th>Провайдер</th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>
    <div id="emptyLog" class="empty-msg">Логов пока нет.</div>
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const VALID_USER = 'АлисаАЙПИ';
    const VALID_PASS = 'IpAlica';
    const STORAGE_KEY = 'visitLogs';

    // ==================== РАБОТА С ЛОГАМИ ====================
    function getLogs() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }
    function saveLogs(logs) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    // ==================== JSONP-ЗАПРОСЫ ====================
    function jsonpRequest(url, callbackName) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const callback = callbackName || 'jsonp_' + Date.now();
            window[callback] = function(data) {
                delete window[callback];
                document.body.removeChild(script);
                resolve(data);
            };
            script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callback;
            script.onerror = function() {
                delete window[callback];
                document.body.removeChild(script);
                reject(new Error('JSONP request failed'));
            };
            document.body.appendChild(script);
            // Таймаут
            setTimeout(() => {
                if (window[callback]) {
                    delete window[callback];
                    document.body.removeChild(script);
                    reject(new Error('Timeout'));
                }
            }, 8000);
        });
    }

    // ==================== ПОЛУЧЕНИЕ ГЕОДАННЫХ И УЛИЦЫ ====================
    async function getFullGeoData() {
        let result = {
            ip: 'неизвестно',
            country: '—',
            region: '—',
            city: '—',
            street: '—',
            isp: '—'
        };

        // Шаг 1: IP и координаты через ip-api.com
        try {
            const geo = await jsonpRequest('https://ip-api.com/json/?fields=status,country,regionName,city,lat,lon,isp,query');
            if (geo && geo.status === 'success') {
                result.ip = geo.query || 'неизвестно';
                result.country = geo.country || '—';
                result.region = geo.regionName || '—';
                result.city = geo.city || '—';
                result.isp = geo.isp || '—';
                const lat = geo.lat;
                const lon = geo.lon;
                if (lat && lon) {
                    // Шаг 2: получаем улицу через geocode.xyz (JSONP)
                    try {
                        const addrData = await jsonpRequest(
                            `https://geocode.xyz/${lat},${lon}?geoit=json&jsoncallback=`
                        );
                        if (addrData && addrData.street) {
                            const street = addrData.street || '';
                            const housenumber = addrData.housenumber || '';
                            const parts = [street, housenumber].filter(Boolean);
                            result.street = parts.join(', ') || '—';
                        } else if (addrData && addrData.display_name) {
                            // запасной вариант — берём из display_name первую часть
                            const parts = addrData.display_name.split(',');
                            result.street = parts[0] || '—';
                        } else {
                            result.street = '—';
                        }
                    } catch (e) {
                        console.warn('Не удалось получить улицу:', e);
                        result.street = '— (ошибка геокодера)';
                    }
                }
            } else {
                // если ip-api вернул ошибку
                result.country = '— (ошибка IP)';
            }
        } catch (e) {
            console.warn('Ошибка получения геоданных:', e);
            result.country = '— (ошибка)';
        }

        return result;
    }

    // ==================== ДОБАВЛЕНИЕ ЗАПИСИ ====================
    async function addLogEntry() {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = '<span class="loader"></span> Определяем местоположение...';

        let geo;
        try {
            geo = await getFullGeoData();
        } catch (e) {
            console.error('Критическая ошибка:', e);
            geo = { ip: 'ошибка', country: '—', region: '—', city: '—', street: '—', isp: '—' };
        }
        statusDiv.innerHTML = '✅ Данные получены';

        const now = new Date();
        const datetime = now.toLocaleString('ru-RU', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });

        const logs = getLogs();
        logs.push({
            datetime,
            ip: geo.ip || 'неизвестно',
            country: geo.country || '—',
            region: geo.region || '—',
            city: geo.city || '—',
            street: geo.street || '—',
            isp: geo.isp || '—'
        });
        saveLogs(logs);
        return logs;
    }

    // ==================== ОТОБРАЖЕНИЕ ТАБЛИЦЫ ====================
    function renderTable() {
        const logs = getLogs();
        const tbody = document.getElementById('logBody');
        const empty = document.getElementById('emptyLog');
        tbody.innerHTML = '';
        if (logs.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        [...logs].reverse().forEach(entry => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${entry.datetime}</td>
                <td>${entry.ip}</td>
                <td>${entry.country}</td>
                <td>${entry.region}</td>
                <td>${entry.city}</td>
                <td>${entry.street}</td>
                <td>${entry.isp}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ==================== АВТОРИЗАЦИЯ ====================
    function isLoggedIn() { return sessionStorage.getItem('loggedIn') === 'true'; }

    async function login(username, password) {
        if (username === VALID_USER && password === VALID_PASS) {
            sessionStorage.setItem('loggedIn', 'true');
            await addLogEntry();
            showMain();
            return true;
        }
        return false;
    }

    function logout() {
        sessionStorage.removeItem('loggedIn');
        showModal();
    }

    function showModal() {
        document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('loginForm').reset();
        document.getElementById('statusMessage').innerHTML = '';
    }

    function showMain() {
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('mainContent').style.display = 'block';
        renderTable();
        document.getElementById('statusMessage').innerHTML = '';
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const err = document.getElementById('loginError');
            err.textContent = '⏳ Проверка...';
            const ok = await login(user, pass);
            if (!ok) err.textContent = 'Неверные данные!';
            else err.textContent = '';
        });

        document.getElementById('logoutBtn').addEventListener('click', logout);

        if (isLoggedIn()) showMain(); else showModal();
    });
</script>
</body>
</html>

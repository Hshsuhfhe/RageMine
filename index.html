<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPDEV | Premium Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --header-bg: #11141d;
            --card-bg: #151921;
            --border: #22272e;
            --text-main: #adbac7;
            --text-bright: #ffffff;
            --gold: #ffb800;
            --silver: #969696;
            --bronze: #cd7f32;
            --accent: #4a90e2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; }

        /* --- Navbar --- */
        .navbar {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; height: 64px; position: sticky; top: 0; z-index: 1000;
        }
        .logo { color: white; font-weight: 900; letter-spacing: -1px; font-size: 20px; }
        .search-wrapper {
            background: #1c212b; border-radius: 20px; padding: 6px 15px;
            display: flex; align-items: center; border: 1px solid transparent;
        }
        .search-wrapper input { background: transparent; border: none; color: white; outline: none; margin-left: 10px; font-size: 13px; }

        /* --- Main Content --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .row {
            display: grid; grid-template-columns: 120px 1fr 140px 200px;
            background: var(--card-bg); margin-bottom: 8px; border-radius: 6px;
            align-items: center; cursor: pointer; transition: 0.2s;
            overflow: hidden; border: 1px solid transparent;
        }
        .row:hover { background: #1c222d; border-color: #3e4451; transform: scale(1.01); }

        /* --- ТРЕУГОЛЬНЫЕ БЛОКИ (Top 3) --- */
        .rank-polygon {
            height: 60px; width: 100px;
            display: flex; align-items: center; justify-content: center;
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
            position: relative;
        }
        .rank-polygon span {
            font-weight: 900; font-size: 28px; color: white; font-style: italic;
            margin-right: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .poly-1 { background: linear-gradient(135deg, #ffb800, #ff8a00); box-shadow: inset -10px 0 20px rgba(0,0,0,0.2); }
        .poly-2 { background: linear-gradient(135deg, #bdc3c7, #2c3e50); }
        .poly-3 { background: linear-gradient(135deg, #cd7f32, #7d4411); }

        .rank-normal { padding-left: 30px; font-weight: 700; font-size: 18px; color: var(--text-main); }

        /* --- КРАСИВЫЕ РАНГИ С ОБОДКОМ --- */
        .badge {
            padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 800;
            text-align: center; text-transform: uppercase; width: fit-content;
            border: 2px solid transparent; position: relative;
        }
        .bdev { 
            background: rgba(255, 184, 0, 0.1); color: var(--gold); 
            border-color: var(--gold); box-shadow: 0 0 10px rgba(255, 184, 0, 0.3);
        }
        .dhr { background: rgba(74, 144, 226, 0.1); color: #4a90e2; border-color: #4a90e2; }
        .dlr { background: rgba(173, 186, 199, 0.05); color: #768390; border-color: #3e4451; }

        /* --- Критерии --- */
        .tiers { display: flex; gap: 8px; justify-content: flex-end; padding-right: 20px; }
        .tier-dot { width: 30px; height: 30px; background: #0b0e14; border-radius: 50%; border: 1px solid #2d333b; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--header-bg); padding: 40px; border-radius: 12px;
            width: 400px; border: 1px solid var(--border); text-align: center;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-name { font-size: 24px; font-weight: 800; color: white; margin-bottom: 10px; }
        .close-btn { margin-top: 20px; padding: 10px 20px; background: var(--accent); border: none; color: white; border-radius: 6px; cursor: pointer; }

        .eval-box {
            position: fixed; bottom: 30px; right: 30px; background: var(--accent);
            color: white; padding: 15px 25px; border-radius: 8px; text-decoration: none; font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .eval-box:hover { transform: translateY(-5px); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">TOPDEV</div>
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Поиск разработчика...">
    </div>
</nav>

<div class="container" id="devList">
    </div>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <div class="modal-name" id="modalName">Name</div>
        <div id="modalRank">Rank</div>
        <div style="margin-top: 20px; color: var(--text-main);" id="modalDesc">
            Опыт разработки: 5 лет<br>Стек: React, Node.js, Python<br>Проектов завершено: 42
        </div>
        <button class="close-btn" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<a href="https://t.me/Franzosren?text=я%20хочу%20пройти%20тест" class="eval-box">ОЦЕНИ СЕБЯ</a>

<script>
    const players = [
        { name: "Baraschki", rank: "B DEV", type: "bdev" },
        { name: "Coldified", rank: "DHR 5", type: "dhr" },
        { name: "Swight", rank: "DHR 3", type: "dhr" },
        { name: "Janekv", rank: "DLR 5", type: "dlr" },
        { name: "BlvckWlf", rank: "DLR 4", type: "dlr" },
        { name: "Kylaz", rank: "DLR 2", type: "dlr" },
        { name: "Ninoroc15", rank: "DLR 1", type: "dlr" },
        { name: "Lurrn", rank: "DLR 1", type: "dlr" },
        { name: "Arsakha", rank: "DLR 1", type: "dlr" },
        { name: "yMiau", rank: "DLR 1", type: "dlr" }
    ];

    const list = document.getElementById('devList');

    players.forEach((p, i) => {
        const num = i + 1;
        const row = document.createElement('div');
        row.className = 'row';
        row.dataset.name = p.name.toLowerCase();
        row.onclick = () => openModal(p.name, p.rank);

        let rankBlock;
        if (num <= 3) {
            rankBlock = `<div class="rank-polygon poly-${num}"><span>${num}.</span></div>`;
        } else {
            rankBlock = `<div class="rank-normal">${num}.</div>`;
        }

        row.innerHTML = `
            ${rankBlock}
            <div style="font-weight: 700; color: white;">${p.name}</div>
            <div class="badge ${p.type}">${p.rank}</div>
            <div class="tiers">
                <div class="tier-dot">⚙️</div>
                <div class="tier-dot">💻</div>
                <div class="tier-dot">🧠</div>
            </div>
        `;
        list.appendChild(row);
    });

    function openModal(name, rank) {
        document.getElementById('modalName').innerText = name;
        document.getElementById('modalRank').innerText = rank;
        document.getElementById('infoModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('infoModal').style.display = 'none';
    }

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.row').forEach(row => {
            row.classList.toggle('hidden', !row.dataset.name.includes(val));
        });
    });
</script>

</body>
</html>

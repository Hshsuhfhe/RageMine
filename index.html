<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DEV RANK • Global Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0d12;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: #e4e4e7;
      padding: 1.5rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #13131a;
      border-radius: 0.75rem;
      overflow: hidden;
      border: 1px solid #252530;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 20px 60px rgba(0,0,0,0.6);
    }

    .header {
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      background: #16161f;
      border-bottom: 1px solid #252530;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.2rem;
      color: #fff;
      box-shadow: 0 0 20px rgba(139,92,246,0.3);
    }

    .logo-text h2 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: #f4f4f5;
    }

    .logo-text span {
      font-size: 0.7rem;
      color: #a1a1aa;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .tabs {
      display: flex;
      gap: 0.25rem;
      background: #1e1e28;
      border-radius: 0.5rem;
      padding: 0.25rem;
    }

    .tab-btn {
      padding: 0.55rem 1.1rem;
      border: none;
      background: transparent;
      color: #a1a1aa;
      font-weight: 600;
      font-size: 0.8rem;
      border-radius: 0.4rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.2px;
    }

    .tab-btn.active {
      background: #2a2a38;
      color: #f4f4f5;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }

    .tab-btn:hover {
      color: #d4d4d8;
      background: rgba(255,255,255,0.03);
    }

    .filter-bar {
      padding: 0.75rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      background: #16161f;
      border-bottom: 1px solid #22222e;
      font-size: 0.8rem;
      color: #a1a1aa;
    }

    .country-pills {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .country-pill {
      padding: 0.35rem 0.85rem;
      border-radius: 0.35rem;
      font-size: 0.72rem;
      font-weight: 600;
      background: #1e1e28;
      color: #a1a1aa;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.1px;
    }

    .country-pill.active {
      background: #6366f1;
      color: #fff;
      box-shadow: 0 0 12px rgba(99,102,241,0.4);
    }

    .country-pill:hover {
      background: #2a2a38;
      color: #e4e4e7;
    }
    .country-pill.active:hover {
      background: #6366f1;
    }

    .sort-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #71717a;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead th {
      padding: 0.9rem 1.5rem;
      text-align: left;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #71717a;
      background: #111118;
      border-bottom: 1px solid #22222e;
      white-space: nowrap;
    }

    tbody td {
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid #1e1e28;
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.15s;
    }

    tbody tr {
      transition: background 0.2s;
    }

    tbody tr:hover {
      background: rgba(99, 102, 241, 0.06);
    }

    .rank-num {
      font-weight: 800;
      font-size: 1rem;
      color: #a1a1aa;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e1e28;
      border-radius: 0.35rem;
    }

    .rank-1 .rank-num {
      background: #fbbf24;
      color: #0d0d12;
      box-shadow: 0 0 14px rgba(251,191,36,0.5);
    }
    .rank-2 .rank-num {
      background: #a1a1aa;
      color: #0d0d12;
      box-shadow: 0 0 10px rgba(161,161,170,0.4);
    }
    .rank-3 .rank-num {
      background: #cd7f32;
      color: #0d0d12;
      box-shadow: 0 0 10px rgba(205,127,50,0.4);
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 0.35rem;
      background: linear-gradient(135deg, #4c1d95, #5b21b6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: #ddd6fe;
      flex-shrink: 0;
    }

    .player-name {
      font-weight: 700;
      color: #f4f4f5;
      letter-spacing: -0.2px;
    }

    .bdev-tag {
      background: #fbbf24;
      color: #0d0d12;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 0.2rem 0.55rem;
      border-radius: 0.25rem;
      letter-spacing: 0.3px;
      margin-left: 0.35rem;
      text-transform: uppercase;
      box-shadow: 0 0 8px rgba(251,191,36,0.4);
    }

    .rank-badge {
      display: inline-block;
      padding: 0.25rem 0.7rem;
      border-radius: 0.3rem;
      font-weight: 700;
      font-size: 0.78rem;
      background: #1e1e28;
      color: #c4b5fd;
      letter-spacing: 0.3px;
    }

    .rank-badge.dhr {
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
    }

    .rank-badge.dlr {
      background: rgba(236,72,153,0.12);
      color: #f9a8d4;
    }

    .empty-state {
      color: #52525b;
      font-style: italic;
      font-size: 0.8rem;
      padding: 0.5rem 0;
    }

    .footer-stats {
      padding: 0.9rem 1.75rem;
      background: #111118;
      border-top: 1px solid #22222e;
      font-size: 0.7rem;
      color: #52525b;
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.3px;
    }

    @media (max-width: 600px) {
      body { padding: 0.5rem; }
      .header { padding: 1rem; }
      .filter-bar { padding: 0.75rem 1rem; }
      thead th, tbody td { padding: 0.7rem 0.8rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">DV</div>
      <div class="logo-text">
        <h2>DEV RANK</h2>
        <span>Global Leaderboard</span>
      </div>
    </div>
    <div class="tabs" id="categoryTabs">
      <button class="tab-btn active" data-cat="overall">Overall</button>
      <button class="tab-btn" data-cat="dhr">DHR</button>
      <button class="tab-btn" data-cat="dlr">DLR</button>
      <button class="tab-btn" data-cat="bdev">B DEV</button>
    </div>
  </div>

  <div class="filter-bar">
    <div class="country-pills" id="countryPills">
      <button class="country-pill active" data-country="all">🌍 Все</button>
      <button class="country-pill" data-country="russia">🇷🇺 Россия</button>
      <button class="country-pill" data-country="ukraine">🇺🇦 Украина</button>
      <button class="country-pill" data-country="usa">🇺🇸 Америка</button>
      <button class="country-pill" data-country="germany">🇩🇪 Германия</button>
    </div>
    <div class="sort-indicator">
      <span>🔽 DHR ↓</span>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Разработчик</th>
          <th>DHR</th>
          <th>DLR</th>
          <th>B DEV</th>
          <th>Страна</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="footer-stats">
    <span>DHR 1-5 (High Rank) · DLR 1-5 (Low Rank, 5=лучший)</span>
    <span id="playerCount">0 разработчиков</span>
  </div>
</div>

<script>
  (() => {
    const developers = [
      { name: "Baraschki", country: "russia", dhr: 5, dlr: 5, bdev: true },
      { name: "VoidCipher", country: "russia", dhr: 4, dlr: 4, bdev: false },
      { name: "NexaByte", country: "russia", dhr: 3, dlr: 5, bdev: false },
      { name: "KiberKot", country: "russia", dhr: 5, dlr: 3, bdev: false },
      { name: "Devastator", country: "ukraine", dhr: 5, dlr: 5, bdev: true },
      { name: "PixelGhost", country: "ukraine", dhr: 4, dlr: 4, bdev: false },
      { name: "RootPhantom", country: "usa", dhr: 5, dlr: 5, bdev: true },
      { name: "SyntaxSam", country: "usa", dhr: 4, dlr: 5, bdev: false },
      { name: "NeonX", country: "usa", dhr: 5, dlr: 4, bdev: false },
      { name: "Baraschki", country: "germany", dhr: 5, dlr: 5, bdev: true },
      { name: "KraftWerk", country: "germany", dhr: 4, dlr: 5, bdev: false },
      { name: "ByteBauer", country: "germany", dhr: 4, dlr: 4, bdev: false },
      { name: "NullRaum", country: "germany", dhr: 5, dlr: 3, bdev: false },
      { name: "SchattenDev", country: "germany", dhr: 3, dlr: 4, bdev: false },
      { name: "CyberFox", country: "russia", dhr: 2, dlr: 5, bdev: false },
      { name: "GlitchMaster", country: "usa", dhr: 5, dlr: 2, bdev: true },
    ];

    const countryNames = {
      russia: "Россия",
      ukraine: "Украина",
      usa: "Америка",
      germany: "Германия"
    };

    const countryFlags = {
      russia: "🇷🇺",
      ukraine: "🇺🇦",
      usa: "🇺🇸",
      germany: "🇩🇪"
    };

    let activeCountry = 'all';
    let activeCategory = 'overall';

    const tableBody = document.getElementById('tableBody');
    const playerCountSpan = document.getElementById('playerCount');
    const countryPills = document.querySelectorAll('.country-pill');
    const categoryTabs = document.querySelectorAll('.tab-btn');

    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() || name[0].toUpperCase();
    }

    function renderTable() {
      let filtered = [...developers];

      if (activeCountry !== 'all') {
        filtered = filtered.filter(d => d.country === activeCountry);
      }

      filtered.sort((a, b) => {
        if (b.dhr !== a.dhr) return b.dhr - a.dhr;
        if (b.dlr !== a.dlr) return b.dlr - a.dlr;
        return a.name.localeCompare(b.name);
      });

      if (activeCategory === 'bdev') {
        filtered.sort((a, b) => (b.bdev ? 1 : 0) - (a.bdev ? 1 : 0) || b.dhr - a.dhr || b.dlr - a.dlr);
      } else if (activeCategory === 'dhr') {
        filtered.sort((a, b) => b.dhr - a.dhr || b.dlr - a.dlr);
      } else if (activeCategory === 'dlr') {
        filtered.sort((a, b) => b.dlr - a.dlr || b.dhr - a.dhr);
      }

      const top10 = filtered.slice(0, 10);
      let rows = '';

      for (let i = 0; i < 10; i++) {
        const dev = top10[i] || null;
        const rank = i + 1;
        let rankClass = '';
        if (rank === 1) rankClass = 'rank-1';
        else if (rank === 2) rankClass = 'rank-2';
        else if (rank === 3) rankClass = 'rank-3';

        if (!dev) {
          rows += `
            <tr>
              <td><div class="rank-num">${rank}</div></td>
              <td><div class="empty-state">— нет участника —</div></td>
              <td><span class="empty-state">—</span></td>
              <td><span class="empty-state">—</span></td>
              <td><span class="empty-state">—</span></td>
              <td><span class="empty-state">—</span></td>
            </tr>`;
          continue;
        }

        rows += `
          <tr class="${rankClass}">
            <td><div class="rank-num">${rank}</div></td>
            <td>
              <div class="player-cell">
                <div class="avatar">${getInitials(dev.name)}</div>
                <span class="player-name">${dev.name}</span>
                ${dev.bdev ? '<span class="bdev-tag">B DEV</span>' : ''}
              </div>
            </td>
            <td><span class="rank-badge dhr">⚡ ${dev.dhr}</span></td>
            <td><span class="rank-badge dlr">💎 ${dev.dlr}</span></td>
            <td>${dev.bdev ? '✅' : '<span style="color:#52525b;">—</span>'}</td>
            <td>${countryFlags[dev.country] || '🌍'} ${countryNames[dev.country] || dev.country}</td>
          </tr>`;
      }

      tableBody.innerHTML = rows;
      playerCountSpan.textContent = `${filtered.length} разработчиков`;
    }

    countryPills.forEach(btn => {
      btn.addEventListener('click', () => {
        countryPills.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCountry = btn.dataset.country;
        renderTable();
      });
    });

    categoryTabs.forEach(btn => {
      btn.addEventListener('click', () => {
        categoryTabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.cat;
        renderTable();
      });
    });

    renderTable();
  })();
</script>
</body>
</html>

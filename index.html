<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логи (JSONP + улица)</title>
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index:1000; padding:20px; }
        .modal.hidden { display: none; }
        .modal-content { background:#fff; padding:30px 24px; border-radius:24px; max-width:380px; width:100%; text-align:center; }
        .modal-content input { width:100%; padding:14px; margin:8px 0; border:1px solid #ccc; border-radius:14px; font-size:16px; }
        .modal-content button { width:100%; padding:14px; background:#4a6cf7; color:#fff; border:none; border-radius:14px; font-size:18px; font-weight:600; cursor:pointer; margin-top:16px; }
        .error { color:#e74c3c; margin-top:12px; }
        .container { width:100%; max-width:1200px; background:#fff; border-radius:24px; padding:20px; }
        .header { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; border-bottom:1px solid #e9ecf0; padding-bottom:14px; margin-bottom:18px; }
        .header h1 { font-size:22px; }
        .logout-btn { background:#ef4444; color:#fff; padding:8px 20px; border:none; border-radius:30px; cursor:pointer; }
        .table-wrapper { overflow-x:auto; border-radius:14px; border:1px solid #e9ecf0; }
        table { width:100%; min-width:800px; border-collapse:collapse; font-size:13px; }
        th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #e9ecf0; white-space:nowrap; }
        th { background:#f8f9fc; }
        .empty-msg { text-align:center; color:#94a3b8; padding:30px 0; }
        @media (max-width:600px) { .header h1 { font-size:18px; } th,td { font-size:11px; padding:8px; } table { min-width:650px; } }
        .loader { display:inline-block; width:16px; height:16px; border:3px solid #f3f3f3; border-top:3px solid #4a6cf7; border-radius:50%; animation:spin 0.8s linear infinite; margin-left:8px; vertical-align:middle; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .status { font-size:14px; color:#4a6cf7; margin:8px 0; }
    </style>
</head>
<body>
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>🔐 Вход</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Имя пользователя" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
            <div id="loginError" class="error"></div>
        </form>
    </div>
</div>
<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1>📋 История</h1>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    <div id="statusMessage" class="status"></div>
    <div class="table-wrapper">
        <table>
            <thead><tr>
                <th>Дата и время</th>
                <th>IP</th>
                <th>Страна</th>
                <th>Регион</th>
                <th>Город</th>
                <th>Улица</th>
                <th>Провайдер</th>
            </tr></thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>
    <div id="emptyLog" class="empty-msg">Логов пока нет.</div>
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const VALID_USER = 'АлисаАЙПИ';
    const VALID_PASS = 'IpAlica';
    const STORAGE_KEY = 'visitLogs';

    // ==================== РАБОТА С ЛОГАМИ ====================
    function getLogs() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }
    function saveLogs(logs) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    // ==================== JSONP-ЗАПРОСЫ (ОБЩИЙ МЕТОД) ====================
    function jsonpRequest(url, callbackName) {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            const callback = callbackName || 'jsonp_' + Date.now();
            window[callback] = function(data) {
                delete window[callback];
                document.body.removeChild(script);
                resolve(data);
            };
            script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callback;
            script.onerror = function() {
                delete window[callback];
                document.body.removeChild(script);
                resolve(null);
            };
            document.body.appendChild(script);
            setTimeout(() => {
                if (window[callback]) {
                    delete window[callback];
                    document.body.removeChild(script);
                    resolve(null);
                }
            }, 5000);
        });
    }

    // ==================== ПОЛУЧЕНИЕ ОСНОВНЫХ ДАННЫХ (ip-api.com) ====================
    function fetchGeoViaJSONP() {
        return jsonpRequest('https://ip-api.com/json/?fields=status,country,regionName,city,lat,lon,isp,query');
    }

    // ==================== ПОЛУЧЕНИЕ УЛИЦЫ (geocode.xyz) ====================
    function fetchStreet(lat, lon) {
        if (!lat || !lon) return Promise.resolve(null);
        return jsonpRequest(`https://geocode.xyz/${lat},${lon}?geoit=json`);
    }

    // ==================== ПОЛУЧЕНИЕ ТОЛЬКО IP (запасной вариант) ====================
    function fetchIPOnly() {
        return jsonpRequest('https://api.ipify.org?format=jsonp');
    }

    // ==================== ОСНОВНАЯ ФУНКЦИЯ СБОРА ДАННЫХ ====================
    async function getLocationData() {
        let geo = await fetchGeoViaJSONP();
        let result = {
            ip: 'неизвестно',
            country: '—',
            region: '—',
            city: '—',
            street: '—',
            isp: '—'
        };

        if (geo && geo.status === 'success') {
            result.ip = geo.query || 'неизвестно';
            result.country = geo.country || '—';
            result.region = geo.regionName || '—';
            result.city = geo.city || '—';
            result.isp = geo.isp || '—';
            const lat = geo.lat;
            const lon = geo.lon;
            if (lat && lon) {
                // Пытаемся получить улицу
                const streetData = await fetchStreet(lat, lon);
                if (streetData && (streetData.street || streetData.display_name)) {
                    if (streetData.street) {
                        const house = streetData.housenumber || '';
                        result.street = [streetData.street, house].filter(Boolean).join(', ') || '—';
                    } else if (streetData.display_name) {
                        // берём первую часть из display_name
                        const parts = streetData.display_name.split(',');
                        result.street = parts[0] || '—';
                    }
                } else {
                    result.street = '— (не найдена)';
                }
            }
        } else {
            // Если ip-api не сработал, пробуем получить только IP
            const ipData = await fetchIPOnly();
            if (ipData && ipData.ip) {
                result.ip = ipData.ip;
                result.country = '— (только IP)';
            } else {
                result.ip = 'не удалось';
                result.country = 'ошибка';
            }
        }
        return result;
    }

    // ==================== ДОБАВЛЕНИЕ ЗАПИСИ ====================
    async function addLogEntry() {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = '⏳ Определяем местоположение... <span class="loader"></span>';
        const geo = await getLocationData();
        statusDiv.innerHTML = '';

        const now = new Date();
        const datetime = now.toLocaleString('ru-RU', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });

        const logs = getLogs();
        logs.push({
            datetime: datetime,
            ip: geo.ip || 'неизвестно',
            country: geo.country || '—',
            region: geo.region || '—',
            city: geo.city || '—',
            street: geo.street || '—',
            isp: geo.isp || '—'
        });
        saveLogs(logs);
        return logs;
    }

    // ==================== ОТОБРАЖЕНИЕ ТАБЛИЦЫ ====================
    function renderTable() {
        const logs = getLogs();
        const tbody = document.getElementById('logBody');
        const empty = document.getElementById('emptyLog');
        tbody.innerHTML = '';
        if (logs.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        [...logs].reverse().forEach(entry => {
            // Для старых записей, где нет street, ставим прочерк
            const street = entry.street || '—';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${entry.datetime}</td>
                <td>${entry.ip}</td>
                <td>${entry.country}</td>
                <td>${entry.region}</td>
                <td>${entry.city}</td>
                <td>${street}</td>
                <td>${entry.isp}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ==================== АВТОРИЗАЦИЯ ====================
    function isLoggedIn() { return sessionStorage.getItem('loggedIn') === 'true'; }

    async function login(username, password) {
        if (username === VALID_USER && password === VALID_PASS) {
            sessionStorage.setItem('loggedIn', 'true');
            await addLogEntry();
            showMain();
            return true;
        }
        return false;
    }

    function logout() {
        sessionStorage.removeItem('loggedIn');
        showModal();
    }

    function showModal() {
        document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('loginForm').reset();
        document.getElementById('statusMessage').innerHTML = '';
    }

    function showMain() {
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('mainContent').style.display = 'block';
        renderTable();
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const err = document.getElementById('loginError');
            err.textContent = '⏳ Проверка...';
            const ok = await login(user, pass);
            if (!ok) err.textContent = 'Неверные данные!';
            else err.textContent = '';
        });
        document.getElementById('logoutBtn').addEventListener('click', logout);
        if (isLoggedIn()) showMain(); else showModal();
    });
</script>
</body>
</html>

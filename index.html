<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DEV RANK • Global Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    body {
      background: #06060c;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: #e4e4e7;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(99,102,241,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 80%, rgba(139,92,246,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(236,72,153,0.03) 0%, transparent 70%);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      padding: 1.2rem;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #0b0b14;
      border-radius: 0.85rem;
      overflow: hidden;
      border: 1px solid #1e1e30;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 30px 80px rgba(0,0,0,0.8), 0 0 70px rgba(99,102,241,0.1);
    }

    .header {
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      background: #0f0f1c;
      border-bottom: 1px solid #1c1c2e;
      flex-shrink: 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border-radius: 0.55rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.35rem;
      color: #fff;
      box-shadow: 0 0 28px rgba(139,92,246,0.4);
      position: relative;
      animation: logoGlow 2.5s ease-in-out infinite;
    }

    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 0 28px rgba(139,92,246,0.4); }
      50% { box-shadow: 0 0 44px rgba(139,92,246,0.7); }
    }

    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 0.65rem;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      z-index: -1;
      opacity: 0.45;
      filter: blur(10px);
    }

    .logo-text h2 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: #f4f4f5;
      line-height: 1.1;
    }

    .logo-text span {
      font-size: 0.66rem;
      color: #8b8b9a;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .nav-tabs {
      display: flex;
      gap: 0.3rem;
      background: #161627;
      border-radius: 0.55rem;
      padding: 0.3rem;
      border: 1px solid #222234;
    }

    .nav-tab {
      padding: 0.55rem 1.3rem;
      border: none;
      background: transparent;
      color: #8b8b9a;
      font-weight: 600;
      font-size: 0.77rem;
      border-radius: 0.4rem;
      cursor: pointer;
      transition: all 0.22s;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.2px;
    }

    .nav-tab.active {
      background: #6366f1;
      color: #fff;
      box-shadow: 0 0 18px rgba(99,102,241,0.55);
    }

    .nav-tab:hover:not(.active) {
      color: #d4d4d8;
      background: rgba(255,255,255,0.04);
    }

    .filter-section {
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      background: #0f0f1c;
      border-bottom: 1px solid #1a1a2c;
      flex-shrink: 0;
    }

    .country-group {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .country-chip {
      padding: 0.42rem 1.05rem;
      border-radius: 0.4rem;
      font-size: 0.72rem;
      font-weight: 600;
      background: #181829;
      color: #9d9dab;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.22s;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.1px;
    }

    .country-chip.active {
      background: rgba(99,102,241,0.15);
      border-color: #6366f1;
      color: #c7d2fe;
      box-shadow: 0 0 14px rgba(99,102,241,0.25);
    }

    .country-chip:hover {
      background: #222236;
      color: #e4e4e7;
    }
    .country-chip.active:hover {
      background: rgba(99,102,241,0.22);
    }

    .legend {
      display: flex;
      gap: 1.3rem;
      font-size: 0.67rem;
      color: #6b6b7a;
      letter-spacing: 0.3px;
      font-weight: 500;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .legend .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.dhr { background: #818cf8; box-shadow: 0 0 7px #6366f1; }
    .dot.dlr { background: #f472b6; box-shadow: 0 0 7px #ec4899; }
    .dot.bdev { background: #fbbf24; box-shadow: 0 0 7px #f59e0b; }

    .table-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      position: relative;
    }

    .table-wrapper::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .table-wrapper::-webkit-scrollbar-track {
      background: #0b0b16;
    }
    .table-wrapper::-webkit-scrollbar-thumb {
      background: #25253a;
      border-radius: 3px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
      height: 100%;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 5;
    }

    thead th {
      padding: 0.85rem 1.8rem;
      text-align: left;
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b6b7a;
      background: #0c0c18;
      border-bottom: 1px solid #1a1a2c;
      white-space: nowrap;
    }

    tbody td {
      padding: 0.7rem 1.8rem;
      border-bottom: 1px solid #161629;
      font-size: 0.84rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.15s;
    }

    tbody tr {
      transition: all 0.2s;
    }

    tbody tr:hover {
      background: rgba(99, 102, 241, 0.04);
    }

    .rank-cell {
      font-weight: 800;
      font-size: 0.95rem;
    }

    .rank-shape {
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.9rem;
      position: relative;
      color: #0d0d12;
    }

    .rank-shape.gold {
      background: #fbbf24;
      clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
      animation: goldPulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 22px rgba(251,191,36,0.7);
    }
    .rank-shape.silver {
      background: #a1a1aa;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      animation: silverPulse 2s ease-in-out infinite;
      box-shadow: 0 0 16px rgba(161,161,170,0.5);
    }
    .rank-shape.bronze {
      background: #cd7f32;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      animation: bronzePulse 2.2s ease-in-out infinite;
      box-shadow: 0 0 16px rgba(205,127,50,0.55);
    }
    .rank-shape.default {
      background: #1e1e30;
      color: #a1a1aa;
      clip-path: polygon(20% 0%, 80% 0%, 100% 30%, 100% 70%, 80% 100%, 20% 100%, 0% 70%, 0% 30%);
    }

    @keyframes goldPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 22px rgba(251,191,36,0.7); }
      50% { transform: scale(1.08); box-shadow: 0 0 34px rgba(251,191,36,0.95); }
    }
    @keyframes silverPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 16px rgba(161,161,170,0.5); }
      50% { transform: scale(1.06); box-shadow: 0 0 26px rgba(161,161,170,0.75); }
    }
    @keyframes bronzePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 16px rgba(205,127,50,0.55); }
      50% { transform: scale(1.05); box-shadow: 0 0 24px rgba(205,127,50,0.8); }
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 0.4rem;
      background: linear-gradient(135deg, #4c1d95, #5b21b6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: #ddd6fe;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .player-name {
      font-weight: 700;
      color: #f4f4f5;
      letter-spacing: -0.2px;
    }

    .bdev-badge {
      display: inline-block;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0d0d12;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 0.22rem 0.65rem;
      border-radius: 0.25rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 0 14px rgba(251,191,36,0.5);
      animation: bdevGlow 2s ease-in-out infinite;
    }

    @keyframes bdevGlow {
      0%, 100% { box-shadow: 0 0 14px rgba(251,191,36,0.5); }
      50% { box-shadow: 0 0 24px rgba(251,191,36,0.85); }
    }

    .stat-pill {
      display: inline-block;
      padding: 0.32rem 0.85rem;
      border-radius: 0.3rem;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.2px;
    }

    .stat-pill.dhr {
      background: rgba(99,102,241,0.12);
      color: #a5b4fc;
    }

    .stat-pill.dlr {
      background: rgba(236,72,153,0.1);
      color: #f9a8d4;
    }

    .stat-pill.inactive {
      color: #3f3f4a;
      background: rgba(255,255,255,0.02);
    }

    .points-cell {
      font-weight: 700;
      color: #c7d2fe;
      font-size: 0.85rem;
    }

    .empty-text {
      color: #3a3a48;
      font-style: italic;
      font-size: 0.77rem;
    }

    .footer {
      padding: 0.9rem 2rem;
      background: #0c0c18;
      border-top: 1px solid #1a1a2c;
      font-size: 0.66rem;
      color: #52525b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.3px;
      flex-wrap: wrap;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .footer .count {
      color: #8b8b9a;
      font-weight: 600;
    }

    @media (max-width: 700px) {
      body { padding: 0.5rem; }
      .header, .filter-section, .footer { padding: 0.8rem 1rem; }
      thead th, tbody td { padding: 0.55rem 0.6rem; }
    }
  </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">
<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">DV</div>
      <div class="logo-text">
        <h2>DEV RANK</h2>
        <span>Global Leaderboard</span>
      </div>
    </div>
    <div class="nav-tabs" id="navTabs">
      <button class="nav-tab active" data-tab="overall">🏆 Overall</button>
      <button class="nav-tab" data-tab="dhr">⚡ DHR</button>
      <button class="nav-tab" data-tab="dlr">💎 DLR</button>
      <button class="nav-tab" data-tab="bdev">👑 B DEV</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="country-group" id="countryGroup">
      <button class="country-chip active" data-country="all">🌍 Все страны</button>
      <button class="country-chip" data-country="russia">🇷🇺 Россия</button>
      <button class="country-chip" data-country="ukraine">🇺🇦 Украина</button>
      <button class="country-chip" data-country="usa">🇺🇸 Америка</button>
      <button class="country-chip" data-country="germany">🇩🇪 Германия</button>
    </div>
    <div class="legend">
      <span><span class="dot dhr"></span> DHR</span>
      <span><span class="dot dlr"></span> DLR</span>
      <span><span class="dot bdev"></span> B DEV</span>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Разработчик</th>
          <th>Ранг</th>
          <th>Поинты</th>
          <th>B DEV</th>
          <th>Страна</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="footer">
    <span>⚡ DHR 1-5 (High Rank) · 💎 DLR 1-5 (Low Rank, 5 = лучший) · 👑 B DEV — только 1 в мире</span>
    <span class="count" id="playerCount">0 разработчиков</span>
  </div>
</div>

<script>
  (() => {
    const developers = [
      { name: "Baraschki", country: "germany", rankType: "dhr", rankValue: 5, bdev: true },
      { name: "VoidCipher", country: "russia", rankType: "dhr", rankValue: 4, bdev: false },
      { name: "NexaByte", country: "russia", rankType: "dlr", rankValue: 5, bdev: false },
      { name: "KiberKot", country: "russia", rankType: "dhr", rankValue: 5, bdev: false },
      { name: "Devastator", country: "ukraine", rankType: "dhr", rankValue: 5, bdev: false },
      { name: "PixelGhost", country: "ukraine", rankType: "dlr", rankValue: 4, bdev: false },
      { name: "RootPhantom", country: "usa", rankType: "dhr", rankValue: 5, bdev: false },
      { name: "SyntaxSam", country: "usa", rankType: "dlr", rankValue: 5, bdev: false },
      { name: "NeonX", country: "usa", rankType: "dhr", rankValue: 4, bdev: false },
      { name: "KraftWerk", country: "germany", rankType: "dlr", rankValue: 5, bdev: false },
      { name: "ByteBauer", country: "germany", rankType: "dhr", rankValue: 4, bdev: false },
      { name: "NullRaum", country: "germany", rankType: "dhr", rankValue: 5, bdev: false },
      { name: "SchattenDev", country: "germany", rankType: "dlr", rankValue: 4, bdev: false },
      { name: "CyberFox", country: "russia", rankType: "dlr", rankValue: 5, bdev: false },
      { name: "GlitchMaster", country: "usa", rankType: "dhr", rankValue: 3, bdev: false },
    ];

    const countryNames = {
      russia: "Россия", ukraine: "Украина", usa: "Америка", germany: "Германия"
    };
    const countryFlags = {
      russia: "🇷🇺", ukraine: "🇺🇦", usa: "🇺🇸", germany: "🇩🇪"
    };

    let activeCountry = 'all';
    let activeTab = 'overall';

    const tableBody = document.getElementById('tableBody');
    const playerCountSpan = document.getElementById('playerCount');
    const countryChips = document.querySelectorAll('.country-chip');
    const navTabs = document.querySelectorAll('.nav-tab');

    function getInitials(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    function getPoints(dev) {
      if (dev.rankType === 'dhr') return dev.rankValue * 100 + 50;
      return dev.rankValue * 80 + 20;
    }

    function renderTable() {
      let filtered = [...developers];

      if (activeCountry !== 'all') {
        filtered = filtered.filter(d => d.country === activeCountry);
      }

      const bdevHolder = filtered.find(d => d.bdev === true);
      if (bdevHolder) {
        filtered.forEach(d => {
          if (d !== bdevHolder) d.bdev = false;
        });
      }

      if (activeTab === 'bdev') {
        filtered.sort((a, b) => (b.bdev ? 1 : 0) - (a.bdev ? 1 : 0) || getPoints(b) - getPoints(a));
      } else if (activeTab === 'dhr') {
        filtered.sort((a, b) => {
          const aVal = a.rankType === 'dhr' ? a.rankValue : 0;
          const bVal = b.rankType === 'dhr' ? b.rankValue : 0;
          return bVal - aVal || getPoints(b) - getPoints(a);
        });
      } else if (activeTab === 'dlr') {
        filtered.sort((a, b) => {
          const aVal = a.rankType === 'dlr' ? a.rankValue : 0;
          const bVal = b.rankType === 'dlr' ? b.rankValue : 0;
          return bVal - aVal || getPoints(b) - getPoints(a);
        });
      } else {
        filtered.sort((a, b) => (b.bdev ? 1 : 0) - (a.bdev ? 1 : 0) || getPoints(b) - getPoints(a));
      }

      const top15 = filtered.slice(0, 15);
      let rows = '';

      for (let i = 0; i < 15; i++) {
        const dev = top15[i] || null;
        const rank = i + 1;
        let shapeClass = 'default';
        if (rank === 1) shapeClass = 'gold';
        else if (rank === 2) shapeClass = 'silver';
        else if (rank === 3) shapeClass = 'bronze';

        if (!dev) {
          rows += `
            <tr>
              <td><span class="rank-shape default">${rank}</span></td>
              <td><span class="empty-text">— нет участника —</span></td>
              <td><span class="empty-text">—</span></td>
              <td><span class="empty-text">—</span></td>
              <td><span class="empty-text">—</span></td>
              <td><span class="empty-text">—</span></td>
            </tr>`;
          continue;
        }

        const rankDisplay = dev.rankType === 'dhr'
          ? `<span class="stat-pill dhr">⚡ DHR ${dev.rankValue}</span>`
          : `<span class="stat-pill dlr">💎 DLR ${dev.rankValue}</span>`;

        const points = getPoints(dev);

        rows += `
          <tr>
            <td><span class="rank-shape ${shapeClass}">${rank}</span></td>
            <td>
              <div class="player-cell">
                <div class="avatar">${getInitials(dev.name)}</div>
                <span class="player-name">${dev.name}</span>
              </div>
            </td>
            <td>${rankDisplay}</td>
            <td><span class="points-cell">${points} pts</span></td>
            <td>${dev.bdev ? '<span class="bdev-badge">👑 B DEV</span>' : '<span style="color:#3a3a48;">—</span>'}</td>
            <td>${countryFlags[dev.country] || '🌍'} ${countryNames[dev.country] || dev.country}</td>
          </tr>`;
      }

      tableBody.innerHTML = rows;
      playerCountSpan.textContent = `${filtered.length} разработчиков`;
    }

    countryChips.forEach(chip => {
      chip.addEventListener('click', () => {
        countryChips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeCountry = chip.dataset.country;
        renderTable();
      });
    });

    navTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        navTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        renderTable();
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) {
        e.preventDefault();
      }
      if (e.key === 'F12') e.preventDefault();
    });

    renderTable();
  })();
</script>
</body>
</html>

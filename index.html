<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MC TIERS • DEV RANK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0c;
      --bg-panel: #111116;
      --bg-row: #16161e;
      --accent-orange: #ff9d00;
      --text-gray: #71717a;
      --border: #1f1f27;
      
      /* Tier Colors - как на MCTiers */
      --ht1: #ff4747; --lt1: #ff8c42;
      --ht2: #cc66ff; --lt2: #a366ff;
      --ht3: #47a3ff; --lt3: #47d1ff;
      --ht4: #4ade80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      background: var(--bg-dark);
      color: #fff;
      padding: 40px 10px;
    }

    .mctiers-container {
      max-width: 1050px;
      margin: 0 auto;
      background: var(--bg-panel);
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    /* Навигация как на картинке */
    .header-nav {
      display: flex;
      justify-content: center;
      padding: 15px;
      gap: 10px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
    }

    .nav-tab {
      padding: 10px 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: var(--text-gray);
      transition: 0.2s;
    }

    .nav-tab.active { color: #fff; border-bottom: 2px solid var(--accent-orange); }
    .nav-tab svg { width: 22px; height: 22px; fill: currentColor; }
    .nav-tab span { font-size: 10px; font-weight: 800; text-transform: uppercase; }

    /* Панель стран */
    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 25px;
      background: rgba(255,255,255,0.02);
    }

    .countries { display: flex; gap: 8px; }
    .country-btn {
      background: #1c1c24;
      border: 1px solid var(--border);
      color: var(--text-gray);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .country-btn.active { background: var(--accent-orange); color: #000; border-color: var(--accent-orange); }

    /* Таблица */
    .content { padding: 15px 20px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
    
    th {
      text-align: left;
      padding: 0 15px 10px;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-gray);
    }

    .player-row { background: var(--bg-row); transition: 0.15s; }
    .player-row:hover { background: #1c1c28; }

    td { padding: 12px 15px; }
    td:first-child { border-radius: 6px 0 0 6px; }
    td:last-child { border-radius: 0 6px 6px 0; }

    /* Топ-1 дизайн */
    .player-row.top-1 {
      background: linear-gradient(90deg, rgba(255, 157, 0, 0.08) 0%, var(--bg-row) 100%);
      border-left: 2px solid var(--accent-orange);
    }
    .rank-num { font-weight: 900; color: var(--text-gray); font-size: 16px; }
    .top-1 .rank-num { color: var(--accent-orange); }

    /* Инфо игрока */
    .player-info { display: flex; align-items: center; gap: 15px; }
    .skin-head { width: 36px; height: 36px; background: #2a2a35; border-radius: 4px; overflow: hidden; }
    .name-stack { display: flex; flex-direction: column; }
    .player-name { font-weight: 700; font-size: 14px; color: #eee; }
    .player-sub { font-size: 10px; color: var(--text-gray); margin-top: 2px; }

    /* Твои ранги в стиле MCTiers */
    .tier-box {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 900;
      background: #000;
      margin-right: 5px;
    }
    .HT1 { color: var(--ht1); border: 1px solid rgba(255,71,71,0.3); }
    .LT2 { color: var(--lt2); border: 1px solid rgba(163,102,255,0.3); }
    .HT3 { color: var(--ht3); border: 1px solid rgba(71,163,255,0.3); }
    
    /* Регион тег */
    .region-tag {
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 3px;
      background: #222;
    }
    .EU { color: #4ade80; } .NA { color: #f87171; }

    .bdev-badge {
      background: var(--accent-orange);
      color: #000;
      font-size: 9px;
      font-weight: 900;
      padding: 2px 5px;
      border-radius: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="mctiers-container">
  <div class="header-nav">
    <div class="nav-tab active">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>Overall</span>
    </div>
    <div class="nav-tab">
      <svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.97 4.44c-.31.17-.69.17-1 0l-7.97-4.44c-.31-.17-.53-.5-.53-.88v-9c0-.38.21-.71.53-.88l7.97-4.44c.31-.17.69-.17 1 0l7.97 4.44c.32.17.53.5.53.88v9z"/></svg>
      <span>DHR</span>
    </div>
    <div class="nav-tab">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/></svg>
      <span>DLR</span>
    </div>
  </div>

  <div class="filter-bar">
    <div class="countries" id="countryFilter">
      <button class="country-btn active" data-c="all">All</button>
      <button class="country-btn" data-c="russia">RU</button>
      <button class="country-btn" data-c="ukraine">UA</button>
      <button class="country-btn" data-c="usa">US</button>
      <button class="country-btn" data-c="germany">DE</button>
    </div>
    <div style="font-size: 11px; color: var(--text-gray); font-weight: 600;">SERVER IP: dev.rank.com</div>
  </div>

  <div class="content">
    <table>
      <thead>
        <tr>
          <th style="width: 40px;">#</th>
          <th>Player</th>
          <th>Region</th>
          <th>Tiers / Rank</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>
  </div>
</div>

<script>
  // Твоя база данных (Твоя логика)
  const developers = [
    { name: "ItzRealMe", pts: 550, region: "NA", country: "usa", type: "DHR", val: 5, bdev: true },
    { name: "coldified", pts: 530, region: "EU", country: "germany", type: "DHR", val: 5, bdev: false },
    { name: "VoidCipher", pts: 490, region: "EU", country: "russia", type: "DHR", val: 4, bdev: false },
    { name: "Janekv", pts: 420, region: "EU", country: "germany", type: "DLR", val: 5, bdev: false },
    { name: "KiberKot", pts: 410, region: "EU", country: "russia", type: "DLR", val: 4, bdev: false },
    { name: "Devastator", pts: 390, region: "EU", country: "ukraine", type: "DLR", val: 3, bdev: false }
  ];

  function render(filter = 'all') {
    const table = document.getElementById('tableBody');
    const filtered = filter === 'all' ? developers : developers.filter(d => d.country === filter);
    
    table.innerHTML = filtered.map((d, i) => `
      <tr class="player-row ${i === 0 && filter === 'all' ? 'top-1' : ''}">
        <td class="rank-num">${i + 1}.</td>
        <td>
          <div class="player-info">
            <div class="skin-head" style="background: hsl(${i * 60}, 50%, 40%)"></div>
            <div class="name-stack">
              <span class="player-name">${d.name} ${d.bdev ? '<span class="bdev-badge">B DEV</span>' : ''}</span>
              <span class="player-sub">Combat Master (${d.pts} points)</span>
            </div>
          </div>
        </td>
        <td><span class="region-tag ${d.region}">${d.region}</span></td>
        <td>
          <div style="display: flex;">
            <span class="tier-box HT1">${d.type} ${d.val}</span>
            <span class="tier-box LT2">LT2</span>
            <span class="tier-box HT3" style="opacity: 0.3;">-</span>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // Логика кнопок
  document.querySelectorAll('.country-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelector('.country-btn.active').classList.remove('active');
      btn.classList.add('active');
      render(btn.dataset.c);
    };
  });

  render();
</script>
</body>
</html>

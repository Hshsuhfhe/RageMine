<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPDEV | Developer Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --header-bg: #161b22;
            --card-bg: #12161d;
            --border: #30363d;
            --text-main: #8b949e;
            --text-bright: #ffffff;
            --gold: #ffb800;
            --silver: #bdc3c7;
            --bronze: #cd7f32;
            --accent: #5865f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-y: scroll;
        }

        /* --- Навигация --- */
        .navbar {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 50px; height: 70px; position: sticky; top: 0; z-index: 1000;
        }
        .logo { 
            color: var(--gold); font-weight: 900; font-size: 24px; 
            letter-spacing: -1px; text-transform: uppercase;
        }
        .search-wrapper {
            background: #0d1117; border-radius: 10px; padding: 10px 15px;
            display: flex; align-items: center; border: 1px solid var(--border);
            width: 350px; transition: 0.3s;
        }
        .search-wrapper:focus-within { border-color: var(--accent); }
        .search-wrapper input { 
            background: transparent; border: none; color: white; 
            outline: none; margin-left: 10px; font-size: 14px; width: 100%; cursor: text;
        }

        /* --- Контейнер --- */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* --- Заголовки таблицы --- */
        .table-head {
            display: grid; grid-template-columns: 100px 1fr 150px 250px;
            padding: 10px 25px; font-size: 12px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; color: #484f58;
        }

        /* --- Строка игрока --- */
        .row {
            display: grid; grid-template-columns: 100px 1fr 150px 250px;
            background: var(--card-bg); margin-bottom: 6px; border-radius: 8px;
            align-items: center; cursor: pointer; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; border: 1px solid transparent;
        }
        .row:hover { 
            background: #1c2128; border-color: #484f58; 
            transform: scale(1.01) translateX(5px);
        }

        /* --- Треугольные блоки (Трапеции) для ТОП-3 --- */
        .rank-box {
            height: 70px; width: 85px;
            display: flex; align-items: center; justify-content: center;
            clip-path: polygon(0 0, 100% 0, 75% 100%, 0% 100%);
            position: relative;
        }
        .rank-box span {
            font-weight: 900; font-size: 32px; color: white;
            padding-right: 15px; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Анимация сияния */
        @keyframes shimmer {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.3) contrast(1.2); }
            100% { filter: brightness(1); }
        }

        .poly-1 { background: linear-gradient(135deg, #ffb800, #ff8a00); animation: shimmer 2s infinite; }
        .poly-2 { background: linear-gradient(135deg, #bdc3c7, #606c88); animation: shimmer 2.5s infinite; }
        .poly-3 { background: linear-gradient(135deg, #cd7f32, #59330e); animation: shimmer 3s infinite; }

        .rank-normal { padding-left: 35px; font-weight: 800; font-size: 20px; color: #484f58; }

        /* --- Имя и Ранг --- */
        .player-core { display: flex; flex-direction: column; gap: 4px; }
        .nickname { font-weight: 700; font-size: 18px; color: var(--text-bright); }

        /* --- Ранги с ободком (Neon Badges) --- */
        .badge {
            padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 800;
            text-align: center; text-transform: uppercase; width: fit-content;
            border: 2px solid transparent;
        }
        .bdev { 
            background: rgba(255, 184, 0, 0.1); color: var(--gold); 
            border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 184, 0, 0.2);
        }
        .dhr { background: rgba(88, 101, 242, 0.1); color: #5865f2; border-color: #5865f2; }
        .dlr { background: rgba(139, 148, 158, 0.05); color: #8b949e; border-color: #30363d; }

        /* --- Иконки критериев --- */
        .tiers { display: flex; gap: 10px; justify-content: flex-end; padding-right: 30px; }
        .tier-icon {
            width: 34px; height: 34px; background: #0d1117; border-radius: 8px;
            border: 1px solid var(--border); display: flex; align-items: center; 
            justify-content: center; position: relative; transition: 0.3s;
        }
        .tier-icon:hover { border-color: var(--accent); transform: translateY(-3px); }
        
        .tier-icon::after {
            content: attr(data-title); position: absolute; bottom: 45px;
            background: white; color: black; padding: 5px 10px; border-radius: 4px;
            font-size: 11px; font-weight: 800; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: 0.2s;
        }
        .tier-icon:hover::after { opacity: 1; }

        /* --- Модальное окно --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--header-bg); border: 1px solid var(--border);
            padding: 40px; border-radius: 20px; width: 450px; text-align: center;
            animation: modalIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes modalIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-name { font-size: 32px; font-weight: 900; color: white; margin-bottom: 5px; }
        .modal-badge { margin: 15px auto; }
        .modal-info-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            margin-top: 25px; text-align: left; padding: 20px; background: #0d1117; border-radius: 12px;
        }
        .info-item label { font-size: 11px; text-transform: uppercase; color: #484f58; display: block; }
        .info-item span { color: white; font-weight: 600; }

        .btn-close { 
            margin-top: 30px; padding: 12px 30px; background: var(--accent); 
            border: none; color: white; border-radius: 8px; font-weight: 700; cursor: pointer;
        }

        /* --- Виджет связи --- */
        .tg-widget {
            position: fixed; bottom: 40px; right: 40px;
            background: linear-gradient(135deg, #2ea043, #238636);
            color: white; padding: 18px 30px; border-radius: 50px;
            text-decoration: none; font-weight: 800; font-size: 14px;
            box-shadow: 0 10px 30px rgba(35, 134, 54, 0.4);
            transition: 0.3s; z-index: 1000;
        }
        .tg-widget:hover { transform: scale(1.05) translateY(-5px); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">TOPDEV</div>
    <div class="search-wrapper">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#484f58" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="Поиск разработчика по нику...">
    </div>
</nav>

<div class="container">
    <div class="table-head">
        <div>Ранг</div>
        <div>Разработчик</div>
        <div>Статус</div>
        <div style="text-align: right; padding-right: 30px;">Критерии</div>
    </div>
    <div id="playerList"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <div class="modal-name" id="mName">Baraschki</div>
        <div id="mBadgeContainer"></div>
        <div class="modal-info-grid">
            <div class="info-item"><label>Языки</label><span>JS, Python, C++</span></div>
            <div class="info-item"><label>Проектов</label><span>128 Завершено</span></div>
            <div class="info-item"><label>Опыт</label><span>Senior (6 лет)</span></div>
            <div class="info-item"><label>Репозитории</label><span>450 ⭐</span></div>
        </div>
        <button class="btn-close" onclick="closeModal()">ПОНЯТНО</button>
    </div>
</div>

<a href="https://t.me/Franzosren?text=я%20хочу%20пройти%20тест" class="tg-widget">ОЦЕНИ СЕБЯ</a>

<script>
    const players = [
        { name: "Baraschki", rank: "B DEV", type: "bdev", desc: "Главный архитектор систем. Эксперт во всем." },
        { name: "Coldified", rank: "DHR 5", type: "dhr", desc: "Специалист по высоконагруженным бэкендам." },
        { name: "Swight", rank: "DHR 4", type: "dhr", desc: "Мастер Frontend-анимаций и UI/UX." },
        { name: "Janekv", rank: "DHR 2", type: "dhr", desc: "DevOps инженер, знающий всё про Docker." },
        { name: "BlvckWlf", rank: "DLR 5", type: "dlr", desc: "Активно растущий Fullstack разработчик." },
        { name: "Kylaz", rank: "DLR 5", type: "dlr", desc: "Специалист по безопасности и аудиту кода." },
        { name: "Ninoroc15", rank: "DLR 4", type: "dlr", desc: "Python-разработчик, фанат Data Science." },
        { name: "Lurrn", rank: "DLR 3", type: "dlr", desc: "Мастер скриптов и автоматизации процессов." },
        { name: "Arsakha", rank: "DLR 2", type: "dlr", desc: "Интересуется блокчейном и Web3." },
        { name: "yMiau", rank: "DLR 1", type: "dlr", desc: "Начинающий разработчик на Swift." },
        { name: "PixelLord", rank: "DLR 1", type: "dlr", desc: "Создает инди-игры на Unity." },
        { name: "CyberGhost", rank: "DLR 1", type: "dlr", desc: "Эксперт по Linux-системам." }
    ];

    const listContainer = document.getElementById('playerList');

    function renderPlayers() {
        players.forEach((p, i) => {
            const pos = i + 1;
            const row = document.createElement('div');
            row.className = 'row';
            row.dataset.name = p.name.toLowerCase();
            row.onclick = () => openModal(p);

            let rankHtml;
            if(pos <= 3) {
                rankHtml = `<div class="rank-box poly-${pos}"><span>${pos}.</span></div>`;
            } else {
                rankHtml = `<div class="rank-normal">${pos}.</div>`;
            }

            row.innerHTML = `
                ${rankHtml}
                <div class="player-core">
                    <span class="nickname">${p.name}</span>
                    <span style="font-size: 11px; color: #484f58;">ID: 000${pos}</span>
                </div>
                <div><div class="badge ${p.type}">${p.rank}</div></div>
                <div class="tiers">
                    <div class="tier-icon" data-title="Настройка">⚙️</div>
                    <div class="tier-icon" data-title="Разработка">💻</div>
                    <div class="tier-icon" data-title="Знания">🧠</div>
                    <div class="tier-icon" data-title="Скорость">⚡</div>
                </div>
            `;
            listContainer.appendChild(row);
        });
    }

    function openModal(player) {
        document.getElementById('mName').innerText = player.name;
        document.getElementById('mBadgeContainer').innerHTML = `<div class="badge ${player.type}" style="margin: 0 auto;">${player.rank}</div>`;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    // Поиск
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.row').forEach(r => {
            r.classList.toggle('hidden', !r.dataset.name.includes(val));
        });
    });

    renderPlayers();
</script>
</body>
</html>

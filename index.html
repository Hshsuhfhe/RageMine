<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPDEV | Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --gold: #ffb800;
            --silver: #bdc3c7;
            --bronze: #cd7f32;
            --accent: #5865f2;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- Шапка --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #30363d;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
        }

        .search-bar {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 8px 15px;
            color: white;
            width: 300px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent);
            width: 350px;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.3);
        }

        /* --- Таблица --- */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dev-row {
            display: grid;
            grid-template-columns: 60px 80px 1fr 120px 250px;
            align-items: center;
            background: var(--card-bg);
            margin-bottom: 8px;
            padding: 12px 20px;
            border-radius: 6px;
            transition: all 0.4s ease;
            border: 1px solid transparent;
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dev-row:hover {
            transform: translateX(10px);
            border-color: #30363d;
            background: #1c2128;
        }

        /* --- Призовые места и СИЯНИЕ --- */
        .rank-num { font-weight: 800; font-size: 18px; }

        .rank-1 { border-left: 4px solid var(--gold); }
        .rank-2 { border-left: 4px solid var(--silver); }
        .rank-3 { border-left: 4px solid var(--bronze); }

        .gold-shimmer {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 184, 0, 0.5);
            animation: shimmer 2s infinite linear;
        }

        .silver-shimmer {
            color: var(--silver);
            text-shadow: 0 0 10px rgba(189, 195, 199, 0.5);
            animation: shimmer 2.5s infinite linear;
        }

        .bronze-shimmer {
            color: var(--bronze);
            text-shadow: 0 0 10px rgba(205, 127, 50, 0.5);
            animation: shimmer 3s infinite linear;
        }

        @keyframes shimmer {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.6) drop-shadow(0 0 15px currentColor); }
            100% { filter: brightness(1); }
        }

        /* --- Аватары --- */
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: #30363d;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .nickname { font-weight: 700; font-size: 18px; margin-bottom: 4px; }
        .rank-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }

        /* --- Теги рангов --- */
        .tag {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            text-align: center;
        }
        .tag-bdev { background: rgba(255, 184, 0, 0.1); color: var(--gold); border: 1px solid var(--gold); }
        .tag-dhr { background: rgba(88, 101, 242, 0.1); color: #7289da; border: 1px solid #7289da; }
        .tag-dlr { background: rgba(139, 148, 158, 0.1); color: #8b949e; border: 1px solid #484f58; }

        /* --- Критерии справа --- */
        .criteria-list {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .criterion {
            width: 32px;
            height: 32px;
            background: #0d1117;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: help;
            font-size: 14px;
            border: 1px solid #30363d;
        }

        .criterion::after {
            content: attr(data-title);
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #f0f6fc;
            color: #0d1117;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            font-weight: 700;
        }

        .criterion:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* --- Виджет оценки --- */
        .assess-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #238636, #2ea043);
            padding: 15px 25px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            z-index: 1000;
        }

        .assess-widget:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 40px rgba(46, 160, 67, 0.4);
        }

        .assess-widget span {
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">TopDev</div>
        <input type="text" class="search-bar" id="search" placeholder="Поиск разработчика по имени...">
    </header>

    <div class="container" id="leaderboard">
        <div class="dev-row rank-1" data-name="baraschki">
            <div class="rank-num gold-shimmer">1.</div>
            <div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Baraschki" alt="av"></div>
            <div class="info">
                <div class="nickname">Baraschki</div>
                <div class="rank-label">Global Top Developer</div>
            </div>
            <div class="tag tag-bdev">B DEV</div>
            <div class="criteria-list">
                <div class="criterion" data-title="Настройка">⚙️</div>
                <div class="criterion" data-title="Разработка">💻</div>
                <div class="criterion" data-title="Знания">🧠</div>
                <div class="criterion" data-title="Архитектура">🏗️</div>
                <div class="criterion" data-title="Скорость">⚡</div>
            </div>
        </div>

        <div class="dev-row rank-2" data-name="cyberninja">
            <div class="rank-num silver-shimmer">2.</div>
            <div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="av"></div>
            <div class="info">
                <div class="nickname">CyberNinja</div>
                <div class="rank-label">Senior Backend</div>
            </div>
            <div class="tag tag-dhr">DHR 5</div>
            <div class="criteria-list">
                <div class="criterion" data-title="Настройка">⚙️</div>
                <div class="criterion" data-title="Разработка">💻</div>
                <div class="criterion" data-title="Безопасность">🛡️</div>
            </div>
        </div>

        <div class="dev-row rank-3" data-name="nullpointer">
            <div class="rank-num bronze-shimmer">3.</div>
            <div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Max" alt="av"></div>
            <div class="info">
                <div class="nickname">NullPointer</div>
                <div class="rank-label">Fullstack Expert</div>
            </div>
            <div class="tag tag-dhr">DHR 3</div>
            <div class="criteria-list">
                <div class="criterion" data-title="Знания">🧠</div>
                <div class="criterion" data-title="Разработка">💻</div>
                <div class="criterion" data-title="Логика">🧩</div>
            </div>
        </div>

        <div class="dev-row" data-name="junior_dev">
            <div class="rank-num">4.</div>
            <div class="avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Junior" alt="av"></div>
            <div class="info">
                <div class="nickname">Junior_Dev</div>
                <div class="rank-label">Learning Fast</div>
            </div>
            <div class="tag tag-dlr">DLR 2</div>
            <div class="criteria-list">
                <div class="criterion" data-title="Настройка">⚙️</div>
                <div class="criterion" data-title="Знания">🧠</div>
            </div>
        </div>
    </div>

    <a href="https://t.me/Franzosren?text=я%20хочу%20пройти%20тест" class="assess-widget">
        <span>Оцени себя</span>
    </a>

    <script>
        // Плавный поиск
        const searchInput = document.getElementById('search');
        const rows = document.querySelectorAll('.dev-row');

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            
            rows.forEach(row => {
                const name = row.getAttribute('data-name').toLowerCase();
                if (name.includes(val)) {
                    row.classList.remove('hidden');
                    row.style.opacity = '1';
                    row.style.transform = 'scale(1)';
                } else {
                    row.style.opacity = '0';
                    row.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        if (row.style.opacity === '0') row.classList.add('hidden');
                    }, 300);
                }
            });
        });

        // Небольшая задержка анимации для каждой строки при загрузке
        rows.forEach((row, index) => {
            row.style.animationDelay = `${index * 0.05}s`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPDEV | Premium Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --header-bg: #11141d;
            --card-bg: #151921;
            --border: #22272e;
            --text-main: #adbac7;
            --text-bright: #ffffff;
            --gold: #ffb800;
            --silver: #969696;
            --bronze: #cd7f32;
            --accent: #4a90e2;
            
            /* Цвета для рангов */
            --bdev-glow: rgba(255, 184, 0, 0.4);
            --dhr-glow: rgba(74, 144, 226, 0.3);
            --dlr-glow: rgba(173, 186, 199, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        /* --- Навигация (в стиле 2 фото) --- */
        .navbar {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-links { display: flex; gap: 30px; align-items: center; }

        .nav-item {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active { color: var(--text-bright); }

        .nav-item svg { width: 18px; opacity: 0.7; }

        .search-wrapper {
            position: relative;
            background: #1c212b;
            border-radius: 20px;
            padding: 6px 15px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .search-wrapper:focus-within { border-color: var(--accent); width: 300px; }

        .search-wrapper input {
            background: transparent;
            border: none;
            color: white;
            margin-left: 10px;
            outline: none;
            font-size: 13px;
        }

        .search-hint {
            background: #2d333b;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 10px;
        }

        /* --- Контейнер --- */
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* --- Карточка игрока (Строгий вид) --- */
        .row {
            display: grid;
            grid-template-columns: 70px 1fr 140px 320px;
            background: var(--card-bg);
            margin-bottom: 6px;
            padding: 12px 24px;
            border-radius: 4px;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.5s ease-out backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .row:hover {
            background: #1c222d;
            border-color: #3e4451;
            transform: scale(1.005);
        }

        /* --- Ранги и Сияние --- */
        .rank-number { font-weight: 800; font-size: 18px; }
        
        .gold { color: var(--gold); position: relative; animation: glow-gold 2s infinite; }
        .silver { color: var(--silver); animation: glow-silver 3s infinite; }
        .bronze { color: var(--bronze); animation: glow-bronze 3s infinite; }

        @keyframes glow-gold {
            0%, 100% { text-shadow: 0 0 5px rgba(255, 184, 0, 0.2); }
            50% { text-shadow: 0 0 15px rgba(255, 184, 0, 0.8); }
        }

        .nickname { font-weight: 600; font-size: 16px; color: var(--text-bright); }

        /* --- Красивые теги рангов --- */
        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            text-transform: uppercase;
            width: fit-content;
        }
        .bdev { background: rgba(255, 184, 0, 0.1); color: var(--gold); border: 1px solid var(--gold); box-shadow: 0 0 10px var(--bdev-glow); }
        .dhr { background: rgba(74, 144, 226, 0.1); color: #4a90e2; border: 1px solid #4a90e2; }
        .dlr { background: rgba(173, 186, 199, 0.05); color: #768390; border: 1px solid #3e4451; }

        /* --- ИКОНКИ КРИТЕРИЕВ (вместо смайликов) --- */
        .tiers { display: flex; gap: 8px; justify-content: flex-end; }

        .tier-icon {
            width: 32px;
            height: 32px;
            background: #0b0e14;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #2d333b;
            transition: 0.3s;
            cursor: pointer;
        }

        .tier-icon svg { width: 14px; height: 14px; stroke-width: 2.5; }

        /* Разные цвета для критериев */
        .t-setup { stroke: #f66a0a; background: rgba(246, 106, 10, 0.05); }
        .t-code { stroke: #2188ff; background: rgba(33, 136, 255, 0.05); }
        .t-know { stroke: #34d058; background: rgba(52, 208, 88, 0.05); }
        .t-speed { stroke: #ea4aaa; background: rgba(234, 74, 170, 0.05); }

        .tier-icon:hover {
            transform: translateY(-3px);
            background: #1c212b;
            border-color: currentColor;
        }

        /* Тултип */
        .tier-icon::before {
            content: attr(data-label);
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            color: #000;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            white-space: nowrap;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .tier-icon:hover::before { opacity: 1; bottom: 45px; }

        /* --- Виджет оценки --- */
        .eval-box {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent);
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 2000;
        }

        .eval-box:hover { transform: translateY(-8px) scale(1.05); }
        .eval-box span { font-weight: 800; font-size: 14px; text-transform: uppercase; }
        .eval-box small { opacity: 0.8; font-size: 11px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <div class="logo" style="margin-right: 20px; color: white; font-weight: 900; letter-spacing: -1px;">TOPDEV</div>
            <a class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                Home
            </a>
            <a class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
                Rankings
            </a>
            <a class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                API Docs
            </a>
        </div>

        <div class="search-wrapper">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Search developer...">
            <span class="search-hint">/</span>
        </div>
    </nav>

    <div class="container" id="devList">
        
        <div class="row" data-name="baraschki">
            <div class="rank-number gold">1.</div>

            <div class="tiers">
                <div class="tier-icon t-setup" data-label="Настройка"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div>
                <div class="tier-icon t-code" data-label="Разработка"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg></div>
                <div class="tier-icon t-know" data-label="Знания"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg></div>
                <div class="tier-icon t-speed" data-label="Оптимизация"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg></div>
            </div>
        </div>

        <div class="row" data-name="cypher">
            <div class="rank-number silver">2.</div>
            <div class="nickname">Cypher_X</div>
            <div class="badge dhr">DHR 5</div>
            <div class="tiers">
                <div class="tier-icon t-code" data-label="Разработка"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg></div>
                <div class="tier-icon t-speed" data-label="Оптимизация"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg></div>
            </div>
        </div>

        <div class="row" data-name="nexus">
            <div class="rank-number bronze">3.</div>
            <div class="nickname">NexusDev</div>
            <div class="badge dhr">DHR 2</div>
            <div class="tiers">
                <div class="tier-icon t-setup" data-label="Настройка"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div>
            </div>
        </div>

        <div class="row" data-name="kora">
            <div class="rank-number">4.</div>
            <div class="nickname">Kora_Junior</div>
            <div class="badge dlr">DLR 4</div>
            <div class="tiers">
                <div class="tier-icon t-know" data-label="Знания"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg></div>
            </div>
        </div>

    </div>

    <a href="https://t.me/Franzosren?text=я%20хочу%20пройти%20тест" class="eval-box">
        <span>Оцени себя</span>
        <small>Нажми для связи в Telegram</small>
    </a>

    <script>
        // Поиск
        const searchInput = document.getElementById('searchInput');
        const devRows = document.querySelectorAll('.row');

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            devRows.forEach(row => {
                const name = row.dataset.name.toLowerCase();
                if(name.includes(val)) {
                    row.classList.remove('hidden');
                } else {
                    row.classList.add('hidden');
                }
            });
        });

        // Клавиша '/' для фокуса
        document.addEventListener('keydown', (e) => {
            if (e.key === '/') {
                e.preventDefault();
                searchInput.focus();
            }
        });
    </script>
</body>
</html>

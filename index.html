<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DEV RANK • Global Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    body {
      background: #08080f;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      color: #e4e4e7;
      padding: 2rem;
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(139,92,246,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(236,72,153,0.03) 0%, transparent 70%);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #0f0f18;
      border-radius: 0.75rem;
      overflow: hidden;
      border: 1px solid #1f1f2e;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 25px 70px rgba(0,0,0,0.7), 0 0 60px rgba(99,102,241,0.08);
    }

    .header {
      padding: 1.4rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.2rem;
      background: #12121d;
      border-bottom: 1px solid #1f1f2e;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.3rem;
      color: #fff;
      box-shadow: 0 0 24px rgba(139,92,246,0.35);
      position: relative;
    }

    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 0.6rem;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      z-index: -1;
      opacity: 0.5;
      filter: blur(8px);
    }

    .logo-text h2 {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: #f4f4f5;
      line-height: 1.1;
    }

    .logo-text span {
      font-size: 0.68rem;
      color: #8b8b9a;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .nav-tabs {
      display: flex;
      gap: 0.3rem;
      background: #181825;
      border-radius: 0.55rem;
      padding: 0.3rem;
      border: 1px solid #222230;
    }

    .nav-tab {
      padding: 0.55rem 1.2rem;
      border: none;
      background: transparent;
      color: #8b8b9a;
      font-weight: 600;
      font-size: 0.78rem;
      border-radius: 0.4rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.2px;
    }

    .nav-tab.active {
      background: #6366f1;
      color: #fff;
      box-shadow: 0 0 16px rgba(99,102,241,0.5);
    }

    .nav-tab:hover:not(.active) {
      color: #d4d4d8;
      background: rgba(255,255,255,0.04);
    }

    .filter-section {
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.9rem;
      background: #12121d;
      border-bottom: 1px solid #1c1c2a;
    }

    .country-group {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .country-chip {
      padding: 0.4rem 1rem;
      border-radius: 0.4rem;
      font-size: 0.73rem;
      font-weight: 600;
      background: #1a1a28;
      color: #9d9dab;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.1px;
    }

    .country-chip.active {
      background: rgba(99,102,241,0.15);
      border-color: #6366f1;
      color: #c7d2fe;
      box-shadow: 0 0 12px rgba(99,102,241,0.2);
    }

    .country-chip:hover {
      background: #232332;
      color: #e4e4e7;
    }
    .country-chip.active:hover {
      background: rgba(99,102,241,0.2);
    }

    .legend {
      display: flex;
      gap: 1.2rem;
      font-size: 0.68rem;
      color: #6b6b7a;
      letter-spacing: 0.3px;
      font-weight: 500;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .legend .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.dhr { background: #818cf8; box-shadow: 0 0 6px #6366f1; }
    .dot.dlr { background: #f472b6; box-shadow: 0 0 6px #ec4899; }
    .dot.bdev { background: #fbbf24; box-shadow: 0 0 6px #f59e0b; }

    .table-wrapper {
      overflow-x: auto;
      position: relative;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 750px;
    }

    thead th {
      padding: 0.9rem 1.8rem;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b6b7a;
      background: #0d0d16;
      border-bottom: 1px solid #1c1c2a;
      white-space: nowrap;
    }

    tbody td {
      padding: 0.75rem 1.8rem;
      border-bottom: 1px solid #181825;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.15s;
    }

    tbody tr {
      transition: all 0.2s;
    }

    tbody tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .rank-cell {
      font-weight: 800;
      font-size: 0.95rem;
      color: #a1a1aa;
    }

    .rank-badge-num {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1a1a28;
      border-radius: 0.3rem;
      font-weight: 800;
      font-size: 0.85rem;
    }

    tr.rank-1 .rank-badge-num {
      background: #fbbf24;
      color: #0d0d12;
      box-shadow: 0 0 16px rgba(251,191,36,0.55);
    }
    tr.rank-2 .rank-badge-num {
      background: #a1a1aa;
      color: #0d0d12;
      box-shadow: 0 0 12px rgba(161,161,170,0.45);
    }
    tr.rank-3 .rank-badge-num {
      background: #cd7f32;
      color: #0d0d12;
      box-shadow: 0 0 12px rgba(205,127,50,0.5);
    }

    .player-cell {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 0.4rem;
      background: linear-gradient(135deg, #4c1d95, #5b21b6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: #ddd6fe;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .player-name {
      font-weight: 700;
      color: #f4f4f5;
      letter-spacing: -0.2px;
    }

    .bdev-badge {
      display: inline-block;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0d0d12;
      font-size: 0.6rem;
      font-weight: 800;
      padding: 0.2rem 0.6rem;
      border-radius: 0.25rem;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(251,191,36,0.4);
    }

    .stat-pill {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 0.3rem;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.2px;
    }

    .stat-pill.dhr {
      background: rgba(99,102,241,0.12);
      color: #a5b4fc;
    }

    .stat-pill.dlr {
      background: rgba(236,72,153,0.1);
      color: #f9a8d4;
    }

    .empty-text {
      color: #3f3f4a;
      font-style: italic;
      font-size: 0.78rem;
    }

    .footer {
      padding: 1rem 2rem;
      background: #0d0d16;
      border-top: 1px solid #1c1c2a;
      font-size: 0.68rem;
      color: #52525b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.3px;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer .count {
      color: #8b8b9a;
      font-weight: 600;
    }

    @media (max-width: 650px) {
      body { padding: 0.8rem; }
      .header, .filter-section, .footer { padding: 0.9rem 1rem; }
      thead th, tbody td { padding: 0.6rem 0.7rem; }
    }
  </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">
<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon">DV</div>
      <div class="logo-text">
        <h2>DEV RANK</h2>
        <span>Global Leaderboard</span>
      </div>
    </div>
    <div class="nav-tabs" id="navTabs">
      <button class="nav-tab active" data-tab="overall">🏆 Overall</button>
      <button class="nav-tab" data-tab="dhr">⚡ DHR</button>
      <button class="nav-tab" data-tab="dlr">💎 DLR</button>
      <button class="nav-tab" data-tab="bdev">👑 B DEV</button>
    </div>
  </div>

  <div class="filter-section">
    <div class="country-group" id="countryGroup">
      <button class="country-chip active" data-country="all">🌍 Все страны</button>
      <button class="country-chip" data-country="russia">🇷🇺 Россия</button>
      <button class="country-chip" data-country="ukraine">🇺🇦 Украина</button>
      <button class="country-chip" data-country="usa">🇺🇸 Америка</button>
      <button class="country-chip" data-country="germany">🇩🇪 Германия</button>
    </div>
    <div class="legend">
      <span><span class="dot dhr"></span> DHR 1-5</span>
      <span><span class="dot dlr"></span> DLR 1-5</span>
      <span><span class="dot bdev"></span> B DEV</span>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Разработчик</th>
          <th>DHR</th>
          <th>DLR</th>
          <th>B DEV</th>
          <th>Страна</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="footer">
    <span>⚡ DHR 1-5 (High Rank) · 💎 DLR 1-5 (Low Rank, 5 = лучший) · 👑 B DEV (только 1 на страну)</span>
    <span class="count" id="playerCount">0 разработчиков</span>
  </div>
</div>

<script>
  (() => {
    const developers = [
      { name: "Baraschki", country: "russia", dhr: 5, dlr: 5, bdev: true },
      { name: "VoidCipher", country: "russia", dhr: 4, dlr: 4, bdev: false },
      { name: "NexaByte", country: "russia", dhr: 3, dlr: 5, bdev: false },
      { name: "KiberKot", country: "russia", dhr: 5, dlr: 3, bdev: false },
      { name: "Devastator", country: "ukraine", dhr: 5, dlr: 5, bdev: true },
      { name: "PixelGhost", country: "ukraine", dhr: 4, dlr: 4, bdev: false },
      { name: "RootPhantom", country: "usa", dhr: 5, dlr: 5, bdev: true },
      { name: "SyntaxSam", country: "usa", dhr: 4, dlr: 5, bdev: false },
      { name: "NeonX", country: "usa", dhr: 5, dlr: 4, bdev: false },
      { name: "Baraschki", country: "germany", dhr: 5, dlr: 5, bdev: true },
      { name: "KraftWerk", country: "germany", dhr: 4, dlr: 5, bdev: false },
      { name: "ByteBauer", country: "germany", dhr: 4, dlr: 4, bdev: false },
      { name: "NullRaum", country: "germany", dhr: 5, dlr: 3, bdev: false },
      { name: "SchattenDev", country: "germany", dhr: 3, dlr: 4, bdev: false },
      { name: "CyberFox", country: "russia", dhr: 2, dlr: 5, bdev: false },
      { name: "GlitchMaster", country: "usa", dhr: 5, dlr: 2, bdev: false },
    ];

    const countryNames = {
      russia: "Россия", ukraine: "Украина", usa: "Америка", germany: "Германия"
    };
    const countryFlags = {
      russia: "🇷🇺", ukraine: "🇺🇦", usa: "🇺🇸", germany: "🇩🇪"
    };

    let activeCountry = 'all';
    let activeTab = 'overall';

    const tableBody = document.getElementById('tableBody');
    const playerCountSpan = document.getElementById('playerCount');
    const countryChips = document.querySelectorAll('.country-chip');
    const navTabs = document.querySelectorAll('.nav-tab');

    function getInitials(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    function renderTable() {
      let filtered = [...developers];

      if (activeCountry !== 'all') {
        filtered = filtered.filter(d => d.country === activeCountry);
      }

      if (activeTab === 'bdev') {
        filtered.sort((a, b) => (b.bdev ? 1 : 0) - (a.bdev ? 1 : 0) || b.dhr - a.dhr || b.dlr - a.dlr);
      } else if (activeTab === 'dhr') {
        filtered.sort((a, b) => b.dhr - a.dhr || b.dlr - a.dlr);
      } else if (activeTab === 'dlr') {
        filtered.sort((a, b) => b.dlr - a.dlr || b.dhr - a.dhr);
      } else {
        filtered.sort((a, b) => (b.bdev ? 1 : 0) - (a.bdev ? 1 : 0) || b.dhr - a.dhr || b.dlr - a.dlr);
      }

      const top10 = filtered.slice(0, 10);
      let rows = '';

      for (let i = 0; i < 10; i++) {
        const dev = top10[i] || null;
        const rank = i + 1;
        let rankClass = '';
        if (rank === 1) rankClass = 'rank-1';
        else if (rank === 2) rankClass = 'rank-2';
        else if (rank === 3) rankClass = 'rank-3';

        if (!dev) {
          rows += `
            <tr>
              <td><span class="rank-badge-num">${rank}</span></td>
              <td><span class="empty-text">— нет участника —</span></td>
              <td><span class="empty-text">—</span></td>
              <td><span class="empty-text">—</span></td>
              <td><span class="empty-text">—</span></td>
              <td><span class="empty-text">—</span></td>
            </tr>`;
          continue;
        }

        rows += `
          <tr class="${rankClass}">
            <td><span class="rank-badge-num">${rank}</span></td>
            <td>
              <div class="player-cell">
                <div class="avatar">${getInitials(dev.name)}</div>
                <span class="player-name">${dev.name}</span>
              </div>
            </td>
            <td><span class="stat-pill dhr">⚡ ${dev.dhr}</span></td>
            <td><span class="stat-pill dlr">💎 ${dev.dlr}</span></td>
            <td>${dev.bdev ? '<span class="bdev-badge">👑 B DEV</span>' : '<span style="color:#3f3f4a;">—</span>'}</td>
            <td>${countryFlags[dev.country] || '🌍'} ${countryNames[dev.country] || dev.country}</td>
          </tr>`;
      }

      tableBody.innerHTML = rows;
      playerCountSpan.textContent = `${filtered.length} разработчиков`;
    }

    countryChips.forEach(chip => {
      chip.addEventListener('click', () => {
        countryChips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeCountry = chip.dataset.country;
        renderTable();
      });
    });

    navTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        navTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        renderTable();
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) {
        e.preventDefault();
      }
      if (e.key === 'F12') e.preventDefault();
    });

    renderTable();
  })();
</script>
</body>
</html>

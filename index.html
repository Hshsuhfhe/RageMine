<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логи с улицей (надёжно)</title>
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index:1000; padding:20px; }
        .modal.hidden { display: none; }
        .modal-content { background:#fff; padding:30px 24px; border-radius:24px; max-width:380px; width:100%; text-align:center; }
        .modal-content input { width:100%; padding:14px; margin:8px 0; border:1px solid #ccc; border-radius:14px; font-size:16px; }
        .modal-content button { width:100%; padding:14px; background:#4a6cf7; color:#fff; border:none; border-radius:14px; font-size:18px; font-weight:600; cursor:pointer; margin-top:16px; }
        .error { color:#e74c3c; margin-top:12px; }
        .container { width:100%; max-width:1200px; background:#fff; border-radius:24px; padding:20px; }
        .header { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; border-bottom:1px solid #e9ecf0; padding-bottom:14px; margin-bottom:18px; }
        .header h1 { font-size:22px; }
        .logout-btn { background:#ef4444; color:#fff; padding:8px 20px; border:none; border-radius:30px; cursor:pointer; }
        .table-wrapper { overflow-x:auto; border-radius:14px; border:1px solid #e9ecf0; }
        table { width:100%; min-width:800px; border-collapse:collapse; font-size:13px; }
        th, td { padding:10px 12px; text-align:left; border-bottom:1px solid #e9ecf0; white-space:nowrap; }
        th { background:#f8f9fc; }
        .empty-msg { text-align:center; color:#94a3b8; padding:30px 0; }
        @media (max-width:600px) { .header h1 { font-size:18px; } th,td { font-size:11px; padding:8px; } table { min-width:650px; } }
        .loader { display:inline-block; width:16px; height:16px; border:3px solid #f3f3f3; border-top:3px solid #4a6cf7; border-radius:50%; animation:spin 0.8s linear infinite; margin-left:8px; vertical-align:middle; }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .status { font-size:14px; color:#4a6cf7; margin:8px 0; }
    </style>
</head>
<body>
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>🔐 Вход</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Имя пользователя" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
            <div id="loginError" class="error"></div>
        </form>
    </div>
</div>
<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h1>📋 История</h1>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    <div id="statusMessage" class="status"></div>
    <div class="table-wrapper">
        <table>
            <thead><tr>
                <th>Дата и время</th>
                <th>IP</th>
                <th>Страна</th>
                <th>Регион</th>
                <th>Город</th>
                <th>Улица</th>
                <th>Провайдер</th>
            </tr></thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>
    <div id="emptyLog" class="empty-msg">Логов пока нет.</div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const VALID_USER = 'АлисаАЙПИ';
    const VALID_PASS = 'IpAlica';
    const STORAGE_KEY = 'visitLogs';

    // ========== РАБОТА С ЛОГАМИ ==========
    function getLogs() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
        catch { return []; }
    }
    function saveLogs(logs) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    // ========== УНИВЕРСАЛЬНЫЙ JSONP (для сервисов, которые поддерживают) ==========
    function jsonpRequest(url, callbackName) {
        return new Promise((resolve) => {
            const script = document.createElement('script');
            const callback = callbackName || 'jsonp_' + Date.now();
            window[callback] = function(data) {
                delete window[callback];
                document.body.removeChild(script);
                resolve(data);
            };
            script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callback;
            script.onerror = function() {
                delete window[callback];
                document.body.removeChild(script);
                resolve(null);
            };
            document.body.appendChild(script);
            setTimeout(() => {
                if (window[callback]) {
                    delete window[callback];
                    document.body.removeChild(script);
                    resolve(null);
                }
            }, 5000);
        });
    }

    // ========== ПОПЫТКИ ПОЛУЧИТЬ ГЕОДАННЫЕ (последовательно) ==========
    async function tryServices() {
        // 1) ip-api.com (JSONP)
        let data = await jsonpRequest('https://ip-api.com/json/?fields=status,country,regionName,city,lat,lon,isp,query');
        if (data && data.status === 'success') {
            return {
                ip: data.query,
                country: data.country,
                region: data.regionName,
                city: data.city,
                isp: data.isp,
                lat: data.lat,
                lon: data.lon,
                source: 'ip-api'
            };
        }

        // 2) ipapi.co (поддерживает JSONP через callback)
        data = await jsonpRequest('https://ipapi.co/json/');
        if (data && data.ip) {
            return {
                ip: data.ip,
                country: data.country_name || '—',
                region: data.region || '—',
                city: data.city || '—',
                isp: data.org || '—',
                lat: data.latitude || null,
                lon: data.longitude || null,
                source: 'ipapi.co'
            };
        }

        // 3) ipinfo.io (поддерживает JSONP)
        data = await jsonpRequest('https://ipinfo.io/json');
        if (data && data.ip) {
            // ipinfo возвращает city, region, country, loc (lat,lon)
            let locParts = (data.loc || '').split(',');
            let lat = locParts[0] ? parseFloat(locParts[0]) : null;
            let lon = locParts[1] ? parseFloat(locParts[1]) : null;
            return {
                ip: data.ip,
                country: data.country || '—',
                region: data.region || '—',
                city: data.city || '—',
                isp: data.org || '—',
                lat: lat,
                lon: lon,
                source: 'ipinfo'
            };
        }

        // Если всё не удалось – возвращаем null
        return null;
    }

    // ========== ПОЛУЧЕНИЕ УЛИЦЫ (через corsproxy.io -> Nominatim) ==========
    async function fetchStreet(lat, lon) {
        if (!lat || !lon) return null;
        try {
            const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&zoom=18&addressdetails=1')}`;
            const response = await fetch(proxyUrl);
            if (!response.ok) return null;
            const data = await response.json();
            if (data && data.address) {
                const addr = data.address;
                const street = addr.road || addr.pedestrian || addr.footway || '';
                const house = addr.house_number || '';
                const suburb = addr.suburb || addr.neighbourhood || '';
                const parts = [street, house, suburb].filter(Boolean);
                return parts.join(', ') || null;
            }
        } catch (e) {
            // игнорируем
        }
        return null;
    }

    // ========== ГЛАВНАЯ ФУНКЦИЯ СБОРА ВСЕХ ДАННЫХ ==========
    async function getFullData() {
        let geo = await tryServices();
        let result = {
            ip: 'неизвестно',
            country: '—',
            region: '—',
            city: '—',
            street: '—',
            isp: '—'
        };

        if (geo) {
            result.ip = geo.ip || 'неизвестно';
            result.country = geo.country || '—';
            result.region = geo.region || '—';
            result.city = geo.city || '—';
            result.isp = geo.isp || '—';
            if (geo.lat && geo.lon) {
                const street = await fetchStreet(geo.lat, geo.lon);
                if (street) result.street = street;
            }
        } else {
            // Если ни один сервис не дал гео, пробуем только IP через ipify (запасной)
            const ipData = await jsonpRequest('https://api.ipify.org?format=jsonp');
            if (ipData && ipData.ip) {
                result.ip = ipData.ip;
                result.country = '— (только IP)';
            } else {
                result.ip = 'не удалось';
                result.country = 'ошибка';
            }
        }
        return result;
    }

    // ========== ДОБАВЛЕНИЕ ЗАПИСИ ==========
    async function addLogEntry() {
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.innerHTML = '⏳ Определяем местоположение... <span class="loader"></span>';
        const data = await getFullData();
        statusDiv.innerHTML = '';

        const now = new Date();
        const datetime = now.toLocaleString('ru-RU', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });

        const logs = getLogs();
        logs.push({
            datetime: datetime,
            ip: data.ip,
            country: data.country,
            region: data.region,
            city: data.city,
            street: data.street,
            isp: data.isp
        });
        saveLogs(logs);
        return logs;
    }

    // ========== ОТОБРАЖЕНИЕ ТАБЛИЦЫ ==========
    function renderTable() {
        const logs = getLogs();
        const tbody = document.getElementById('logBody');
        const empty = document.getElementById('emptyLog');
        tbody.innerHTML = '';
        if (logs.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        [...logs].reverse().forEach(entry => {
            const street = entry.street || '—';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${entry.datetime}</td>
                <td>${entry.ip}</td>
                <td>${entry.country}</td>
                <td>${entry.region}</td>
                <td>${entry.city}</td>
                <td>${street}</td>
                <td>${entry.isp}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ========== АВТОРИЗАЦИЯ ==========
    function isLoggedIn() { return sessionStorage.getItem('loggedIn') === 'true'; }

    async function login(username, password) {
        if (username === VALID_USER && password === VALID_PASS) {
            sessionStorage.setItem('loggedIn', 'true');
            await addLogEntry();
            showMain();
            return true;
        }
        return false;
    }

    function logout() {
        sessionStorage.removeItem('loggedIn');
        showModal();
    }

    function showModal() {
        document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('loginForm').reset();
        document.getElementById('statusMessage').innerHTML = '';
    }

    function showMain() {
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('mainContent').style.display = 'block';
        renderTable();
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const err = document.getElementById('loginError');
            err.textContent = '⏳ Проверка...';
            const ok = await login(user, pass);
            if (!ok) err.textContent = 'Неверные данные!';
            else err.textContent = '';
        });
        document.getElementById('logoutBtn').addEventListener('click', logout);
        if (isLoggedIn()) showMain(); else showModal();
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Система логирования посещений</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: #fff;
            padding: 30px 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .modal-content h2 {
            font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 20px;
        }
        .modal-content input {
            width: 100%; padding: 14px 16px; margin: 8px 0;
            border: 1px solid #d0d7de; border-radius: 14px;
            font-size: 16px; background: #f8f9fc;
        }
        .modal-content input:focus {
            border-color: #4a6cf7; outline: none; background: #fff;
        }
        .modal-content button {
            width: 100%; padding: 14px;
            background: #4a6cf7; color: #fff;
            border: none; border-radius: 14px;
            font-size: 18px; font-weight: 600; cursor: pointer;
            margin-top: 16px;
        }
        .modal-content button:hover { background: #3b5de7; }
        .error { color: #e74c3c; margin-top: 12px; font-size: 14px; }

        .container {
            width: 100%; max-width: 1100px;
            background: #fff; border-radius: 24px;
            padding: 20px 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            margin-top: 10px;
        }
        .header {
            display: flex; flex-wrap: wrap;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid #e9ecf0;
            padding-bottom: 14px; margin-bottom: 18px;
        }
        .header h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin: 0; }
        .logout-btn {
            background: #ef4444; color: #fff;
            padding: 8px 20px; border: none; border-radius: 30px;
            font-size: 15px; font-weight: 500; cursor: pointer;
            white-space: nowrap;
        }
        .logout-btn:hover { background: #dc2626; }

        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 6px 0 10px;
            border-radius: 14px;
            border: 1px solid #e9ecf0;
        }
        table {
            width: 100%; min-width: 700px;
            border-collapse: collapse; font-size: 13px;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e9ecf0;
            white-space: nowrap;
        }
        th {
            background: #f8f9fc; font-weight: 600; color: #2d3748;
            position: sticky; top: 0; z-index: 2;
        }
        tr:last-child td { border-bottom: none; }
        .empty-msg {
            text-align: center; color: #94a3b8;
            padding: 30px 0; font-size: 16px;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .modal-content { padding: 24px 16px; }
            .modal-content h2 { font-size: 20px; }
            .container { padding: 14px 10px; }
            .header h1 { font-size: 18px; }
            .logout-btn { font-size: 13px; padding: 6px 14px; }
            th, td { padding: 8px 8px; font-size: 11px; }
            table { min-width: 550px; }
        }
        @media (max-width: 400px) {
            th, td { padding: 6px 6px; font-size: 10px; }
            table { min-width: 480px; }
        }
    </style>
</head>
<body>

<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>🔐 Вход</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Имя пользователя" required autocomplete="username">
            <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
            <button type="submit">Войти</button>
            <div id="loginError" class="error"></div>
        </form>
    </div>
</div>

<div class="container" id="mainContent" style="display: none;">
    <div class="header">
        <h1>📋 История посещений</h1>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Дата и время</th>
                    <th>IP-адрес</th>
                    <th>Страна</th>
                    <th>Регион</th>
                    <th>Город</th>
                    <th>Провайдер</th>
                </tr>
            </thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>
    <div id="emptyLog" class="empty-msg">Логов пока нет.</div>
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const VALID_USER = 'АлисаАЙПИ';
    const VALID_PASS = 'IpAlica';
    const STORAGE_KEY = 'visitLogs';

    // ==================== РАБОТА С ЛОГАМИ ====================
    function getLogs() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        } catch (e) {
            return [];
        }
    }

    function saveLogs(logs) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    // ==================== ПОЛУЧЕНИЕ ГЕОДАННЫХ (через HTTPS) ====================
    async function fetchGeoData() {
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 5000); // 5 секунд таймаут

            const response = await fetch('https://ip-api.com/json/?fields=status,country,regionName,city,zip,isp,query', {
                signal: controller.signal
            });
            clearTimeout(timeout);

            if (!response.ok) throw new Error('Ошибка сети: ' + response.status);

            const data = await response.json();
            if (data.status === 'success') {
                return {
                    ip: data.query || 'неизвестно',
                    country: data.country || '—',
                    region: data.regionName || '—',
                    city: data.city || '—',
                    zip: data.zip || '—',
                    isp: data.isp || '—'
                };
            } else {
                throw new Error('API вернул статус: ' + data.status);
            }
        } catch (error) {
            console.warn('Ошибка получения геоданных:', error.message);
            // Возвращаем заглушку с пометкой об ошибке
            return {
                ip: 'ошибка',
                country: 'ошибка',
                region: '—',
                city: '—',
                zip: '—',
                isp: '—'
            };
        }
    }

    // ==================== ДОБАВЛЕНИЕ ЗАПИСИ ====================
    async function addLogEntry() {
        const geo = await fetchGeoData();
        const now = new Date();
        const datetime = now.toLocaleString('ru-RU', {
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
        const logs = getLogs();
        logs.push({
            datetime,
            ip: geo.ip,
            country: geo.country,
            region: geo.region,
            city: geo.city,
            isp: geo.isp
        });
        saveLogs(logs);
        return logs;
    }

    // ==================== ОТОБРАЖЕНИЕ ТАБЛИЦЫ ====================
    function renderTable() {
        const logs = getLogs();
        const tbody = document.getElementById('logBody');
        const emptyMsg = document.getElementById('emptyLog');

        tbody.innerHTML = '';
        if (logs.length === 0) {
            emptyMsg.style.display = 'block';
            return;
        }
        emptyMsg.style.display = 'none';

        const reversed = [...logs].reverse();
        reversed.forEach(entry => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${entry.datetime}</td>
                <td>${entry.ip || '—'}</td>
                <td>${entry.country || '—'}</td>
                <td>${entry.region || '—'}</td>
                <td>${entry.city || '—'}</td>
                <td>${entry.isp || '—'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ==================== АВТОРИЗАЦИЯ ====================
    function isLoggedIn() {
        return sessionStorage.getItem('loggedIn') === 'true';
    }

    async function login(username, password) {
        if (username === VALID_USER && password === VALID_PASS) {
            sessionStorage.setItem('loggedIn', 'true');
            // Записываем визит асинхронно (не блокируем интерфейс)
            addLogEntry().then(() => {
                renderTable(); // обновляем таблицу после записи
            });
            showMainContent();
            return true;
        } else {
            return false;
        }
    }

    function logout() {
        sessionStorage.removeItem('loggedIn');
        showLoginModal();
    }

    function showLoginModal() {
        document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('loginForm').reset();
    }

    function showMainContent() {
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('mainContent').style.display = 'block';
        renderTable();
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('loginError');

            const success = await login(username, password);
            if (!success) {
                errorDiv.textContent = 'Неверное имя пользователя или пароль!';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            logout();
        });

        if (isLoggedIn()) {
            showMainContent();
        } else {
            showLoginModal();
        }
    });
</script>
</body>
</html>

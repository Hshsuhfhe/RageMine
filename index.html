<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEV RANK • Professional Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-body: #0d0d12;
      --bg-card: #14141c;
      --bg-row: #1a1a24;
      --accent: #6366f1; /* Фирменный синий */
      --gold: #fbbf24;
      --text-main: #f1f5f9;
      --text-dim: #94a3b8;
      --border: #262633;
      
      /* Ранги по твоей логике */
      --dhr-color: #4ade80; /* Зеленый для DHR */
      --dlr-color: #f472b6; /* Розовый для DLR */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      background: var(--bg-body);
      color: var(--text-main);
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    /* Верхняя панель (Категории) */
    .top-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }

    .nav-btn {
      background: #1e1e2d;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
    }

    /* Панель стран */
    .sub-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 25px;
      background: rgba(0,0,0,0.2);
    }

    .country-tabs { display: flex; gap: 8px; }
    .c-btn {
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 4px;
    }

    .c-btn.active { background: #2d2d3d; color: white; }

    .hint { font-size: 11px; color: var(--text-dim); font-style: italic; }

    /* Таблица */
    .table-wrapper { padding: 10px 20px 20px; overflow-x: auto; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
    
    th {
      text-align: left;
      padding: 10px 15px;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .row { background: var(--bg-row); transition: 0.2s; }
    .row:hover { background: #22222f; transform: translateY(-1px); }

    td { padding: 12px 15px; vertical-align: middle; }
    td:first-child { border-radius: 8px 0 0 8px; }
    td:last-child { border-radius: 0 8px 8px 0; }

    /* Оформление ТОП-1 по твоей логике */
    .row.top-1 { 
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.1), var(--bg-row));
      border-left: 2px solid var(--gold);
    }
    .rank-num { font-weight: 900; font-size: 16px; color: var(--text-dim); }
    .top-1 .rank-num { color: var(--gold); font-size: 20px; }

    /* Игрок */
    .p-cell { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 34px; height: 34px;
      background: #2d2d3f;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; color: var(--accent);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .name-wrap { display: flex; flex-direction: column; }
    .name { font-weight: 700; font-size: 14px; }
    .pts { font-size: 11px; color: var(--text-dim); }

    /* Твои ранги (DHR/DLR) */
    .badge {
      font-size: 10px;
      font-weight: 900;
      padding: 3px 8px;
      border-radius: 4px;
      background: #0f0f16;
      text-transform: uppercase;
    }
    .badge.dhr { color: var(--dhr-color); border: 1px solid rgba(74, 222, 128, 0.2); }
    .badge.dlr { color: var(--dlr-color); border: 1px solid rgba(244, 114, 182, 0.2); }

    /* Тег B DEV */
    .bdev-tag {
      background: var(--gold);
      color: #000;
      font-size: 9px;
      font-weight: 900;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .flag { margin-right: 5px; opacity: 0.8; }
  </style>
</head>
<body>

<div class="container">
  <div class="top-nav" id="mainTabs">
    <button class="nav-btn active" data-tab="overall">Overall</button>
    <button class="nav-btn" data-tab="dhr">DHR</button>
    <button class="nav-btn" data-tab="dlr">DLR</button>
    <button class="nav-btn" data-tab="bdev">B DEV</button>
  </div>

  <div class="sub-nav">
    <div class="country-tabs" id="countryTabs">
      <button class="c-btn active" data-country="all">Все</button>
      <button class="c-btn" data-country="russia">Россия</button>
      <button class="c-btn" data-country="ukraine">Украина</button>
      <button class="c-btn" data-country="usa">США</button>
      <button class="c-btn" data-country="germany">Германия</button>
    </div>
    <div class="hint">Уровни: 1-5 (Max)</div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th style="width: 50px;">#</th>
          <th>Разработчик</th>
          <th>Ранг</th>
          <th>B DEV</th>
          <th>Страна</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  const developers = [
    { name: "Baraschki", country: "germany", type: "dhr", val: 5, bdev: true, pts: 550 },
    { name: "VoidCipher", country: "russia", type: "dhr", val: 4, bdev: false, pts: 450 },
    { name: "NexaByte", country: "russia", type: "dlr", val: 5, bdev: false, pts: 420 },
    { name: "KiberKot", country: "russia", type: "dhr", val: 5, bdev: false, pts: 500 },
    { name: "Devastator", country: "ukraine", type: "dhr", val: 5, bdev: false, pts: 510 },
    { name: "PixelGhost", country: "ukraine", type: "dlr", val: 4, bdev: false, pts: 340 },
    { name: "RootPhantom", country: "usa", type: "dhr", val: 5, bdev: false, pts: 505 },
    { name: "SyntaxSam", country: "usa", type: "dlr", val: 5, bdev: false, pts: 410 },
    { name: "KraftWerk", country: "germany", type: "dlr", val: 5, bdev: false, pts: 405 },
    { name: "NullRaum", country: "germany", type: "dhr", val: 5, bdev: false, pts: 500 }
  ];

  const flags = { russia: "🇷🇺", ukraine: "🇺🇦", usa: "🇺🇸", germany: "🇩🇪" };
  const names = { russia: "Russia", ukraine: "Ukraine", usa: "USA", germany: "Germany" };

  let activeTab = 'overall';
  let activeCountry = 'all';

  function render() {
    let filtered = [...developers];

    if (activeCountry !== 'all') filtered = filtered.filter(d => d.country === activeCountry);
    
    // Сортировка по твоей логике (B DEV всегда сверху, потом очки)
    filtered.sort((a, b) => (b.bdev - a.bdev) || (b.pts - a.pts));

    if (activeTab === 'dhr') filtered = filtered.filter(d => d.type === 'dhr');
    if (activeTab === 'dlr') filtered = filtered.filter(d => d.type === 'dlr');
    if (activeTab === 'bdev') filtered = filtered.filter(d => d.bdev);

    const html = filtered.map((d, i) => {
      const rank = i + 1;
      return `
        <tr class="row ${rank === 1 ? 'top-1' : ''}">
          <td class="rank-num">${rank}.</td>
          <td>
            <div class="p-cell">
              <div class="avatar">${d.name[0]}</div>
              <div class="name-wrap">
                <span class="name">${d.name}</span>
                <span class="pts">${d.pts} XP</span>
              </div>
            </div>
          </td>
          <td><span class="badge ${d.type}">${d.type.toUpperCase()} ${d.val}</span></td>
          <td>${d.bdev ? '<span class="bdev-tag">B DEV</span>' : '<span style="opacity:0.2">—</span>'}</td>
          <td style="font-size: 12px; color: var(--text-dim)">
            <span class="flag">${flags[d.country]}</span> ${names[d.country]}
          </td>
        </tr>
      `;
    }).join('');

    document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="5" style="text-align:center; padding: 40px; color: #444;">Нет данных</td></tr>';
  }

  // Слушатели событий
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelector('.nav-btn.active').classList.remove('active');
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      render();
    }
  });

  document.querySelectorAll('.c-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelector('.c-btn.active').classList.remove('active');
      btn.classList.add('active');
      activeCountry = btn.dataset.country;
      render();
    }
  });

  render();
</script>
</body>
</html>
